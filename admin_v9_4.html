<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ateliers Inclusion Numérique — Admin v9.3</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="xlsxstyle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="shared.js"></script>
<script>
// ── Export Calendrier — injecté dans VueAdmin ──────────────────────────────
(function(){

  // ── Helpers generateCalendrier ─────────────────────────────────────────
  const MONTH_NAMES_FR_CAL={1:'JANVIER',2:'FÉVRIER',3:'MARS',4:'AVRIL',5:'MAI',6:'JUIN',7:'JUILLET',8:'AOÛT',9:'SEPTEMBRE',10:'OCTOBRE',11:'NOVEMBRE',12:'DÉCEMBRE'};
  const DAY_FR_CAL=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const STATUT_COLORS_CAL={'Réalisé':'70AD47','Annulé':'FF5050','Planifié':'9683EC','Non réalisé':'FFC000','Reporté':'ED7D31'};
  const STATUT_SYMBOLS_CAL={'Réalisé':'R','Annulé':'A','Planifié':'P','Non réalisé':'NR','Reporté':'RP'};

  function isAMCal(h){try{return parseInt(String(h).replace('H',':').split(':')[0])<12;}catch{return true;}}
  function getWorkingDaysCal(year,month){const days=[];const d=new Date(Date.UTC(year,month-1,1));while(d.getUTCMonth()===month-1){if(d.getUTCDay()!==0&&d.getUTCDay()!==6)days.push(new Date(d));d.setUTCDate(d.getUTCDate()+1);}return days;}
  function dateKeyCal(d){return`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;}
  function argbOfCal(hex){return'FF'+hex.toUpperCase();}

  function cellStyleCal(bold=false,bgHex=null,fgHex='000000',sz=8){
    const s={font:{bold,sz,color:{rgb:fgHex}},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:{top:{style:'thin',color:{rgb:'AAAAAA'}},bottom:{style:'thin',color:{rgb:'AAAAAA'}},left:{style:'thin',color:{rgb:'AAAAAA'}},right:{style:'thin',color:{rgb:'AAAAAA'}}}};
    if(bgHex)s.fill={fgColor:{rgb:argbOfCal(bgHex)},patternType:'solid'};return s;
  }
  function cellStyleLeftCal(bold=false,bgHex=null,fgHex='000000',sz=8){
    const s={font:{bold,sz,color:{rgb:fgHex}},alignment:{horizontal:'left',vertical:'center'},border:{top:{style:'thin',color:{rgb:'AAAAAA'}},bottom:{style:'thin',color:{rgb:'AAAAAA'}},left:{style:'thin',color:{rgb:'AAAAAA'}},right:{style:'thin',color:{rgb:'AAAAAA'}}}};
    if(bgHex)s.fill={fgColor:{rgb:argbOfCal(bgHex)},patternType:'solid'};return s;
  }

  window.generateCalendrier=function(df,year,months,conseillers,logFn){
    const wb=XLSX.utils.book_new();
    for(const month of months){
      const monthName=MONTH_NAMES_FR_CAL[month];
      const workingDays=getWorkingDaysCal(year,month);
      const dfMonth=df.filter(r=>r.date.getUTCFullYear()===year&&r.date.getUTCMonth()+1===month);
      const aoa=[];const merges=[];const styles={};
      let currentRow=0;
      function S(r,c,style){styles[`${r},${c}`]=style;}
      function W(r,c,v,style){while(aoa.length<=r)aoa.push([]);while(aoa[r].length<=c)aoa[r].push(null);aoa[r][c]=v;if(style)S(r,c,style);}
      const DATE_START_COL=2;

      for(const conseiller of conseillers){
        const consNorm=conseiller.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        const dfCons=dfMonth.filter(r=>{const rn=(r.conseiller||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');return rn===consNorm;});
        const recapCounts={};
        for(const row of dfCons){const am=row.ampm?row.ampm==='AM':isAMCal(row.horaire);const dk=dateKeyCal(row.date)+(am?'_AM':'_PM');recapCounts[dk]=(recapCounts[dk]||0)+1;}
        function normOrg(s){return String(s||'—').trim().replace(/\s+/g,' ').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
        const seenOrgsKeys=[];const seenOrgs=[];
        for(const row of dfCons){const raw=String(row.orienteur||'—').trim().replace(/\s+/g,' ');const key=normOrg(raw);if(!seenOrgsKeys.includes(key)){seenOrgsKeys.push(key);seenOrgs.push(raw);}}
        const nDataRows=Math.max(1,seenOrgs.length);
        const orgSessions={};
        for(const row of dfCons){const key=normOrg(row.orienteur||'—');if(!orgSessions[key])orgSessions[key]=[];orgSessions[key].push(row);}

        // Titre
        const titleRow=currentRow;
        const titleLastCol=DATE_START_COL+workingDays.length*2-1;
        const titleStyle={font:{bold:true,sz:26,name:'Calibri',color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'FF8DB4E2'},patternType:'solid'},alignment:{horizontal:'center',vertical:'center'}};
        W(titleRow,0,`PLANNING ATELIERS — ${conseiller.toUpperCase()}`,titleStyle);
        for(let c=1;c<=titleLastCol;c++)W(titleRow,c,null,titleStyle);
        merges.push({s:{r:titleRow,c:0},e:{r:titleRow,c:titleLastCol}});currentRow++;

        // Sous-titre mois
        const subRow=currentRow;
        const subStyle={font:{bold:true,sz:18,name:'Calibri',color:{rgb:'16365C'}},fill:{fgColor:{rgb:'FFC5D9F1'},patternType:'solid'},alignment:{horizontal:'center',vertical:'center'}};
        W(subRow,0,`${monthName} ${year}`,subStyle);
        for(let c=1;c<=titleLastCol;c++)W(subRow,c,null,subStyle);
        merges.push({s:{r:subRow,c:0},e:{r:subRow,c:titleLastCol}});currentRow++;

        // En-tête jours
        const hrow=currentRow;
        W(hrow,0,'CoNum',cellStyleCal(true,'1F4E79','FFFFFF',9));
        W(hrow,1,'Organisme',cellStyleCal(true,'1F4E79','FFFFFF',9));
        for(let di=0;di<workingDays.length;di++){const day=workingDays[di];const colAM=DATE_START_COL+di*2;const label=`${DAY_FR_CAL[day.getDay()]} ${String(day.getDate()).padStart(2,'0')}`;W(hrow,colAM,label,cellStyleCal(true,'2E75B6','FFFFFF',8));W(hrow,colAM+1,null,cellStyleCal(true,'2E75B6','FFFFFF',8));merges.push({s:{r:hrow,c:colAM},e:{r:hrow,c:colAM+1}});}
        currentRow++;

        // AM/PM
        const srow=currentRow;
        W(srow,0,null,cellStyleCal(false,null,'000000',8));W(srow,1,null,cellStyleCal(false,null,'000000',8));
        for(let di=0;di<workingDays.length;di++){const colAM=DATE_START_COL+di*2;W(srow,colAM,'AM',cellStyleCal(true,'BDD7EE','1F3864',8));W(srow,colAM+1,'PM',cellStyleCal(true,'9DC3E6','1F3864',8));}
        currentRow++;

        // Lignes données
        for(let oi=0;oi<nDataRows;oi++){
          const rn=currentRow+oi;const org=seenOrgs[oi]||'';
          W(rn,0,conseiller,cellStyleCal(false,null,'000000',8));W(rn,1,org,cellStyleLeftCal(false,null,'000000',8));
          const creneau={};
          for(const sess of(orgSessions[normOrg(org)]||[])){const am=sess.ampm?sess.ampm==='AM':isAMCal(sess.horaire);const ck=dateKeyCal(sess.date)+(am?'_AM':'_PM');if(!creneau[ck])creneau[ck]=[];creneau[ck].push(sess);}
          for(let di=0;di<workingDays.length;di++){
            const day=workingDays[di];const dk=dateKeyCal(day);const colAM=DATE_START_COL+di*2;
            for(const[suffix,col]of[['_AM',colAM],['_PM',colAM+1]]){
              const ck=dk+suffix;
              if(creneau[ck]){const list=creneau[ck];if(list.length===1){const s=list[0].statut;W(rn,col,STATUT_SYMBOLS_CAL[s]||(s?s.slice(0,2):'?'),cellStyleCal(true,STATUT_COLORS_CAL[s]||'D9D9D9','000000',8));}else{W(rn,col,`⚠×${list.length}`,cellStyleCal(true,'7B2FBE','FFFFFF',7));if(logFn)logFn(`⚠ Conflit ${conseiller} | ${org} | ${dk} ${suffix.slice(1)} (${list.length} sessions)`,'err');}}
              else W(rn,col,null,cellStyleCal(false));
            }
          }
        }

        // Recap
        const recapRow=currentRow+nDataRows;
        W(recapRow,0,conseiller,cellStyleLeftCal(true,'D6E4F0','1F3864',8));
        W(recapRow,1,`RECAP ${monthName}`,cellStyleLeftCal(true,'D6E4F0','1F3864',8));
        for(let di=0;di<workingDays.length;di++){const dk=dateKeyCal(workingDays[di]);const colAM=DATE_START_COL+di*2;for(const[isAMSlot,col]of[[true,colAM],[false,colAM+1]]){const count=recapCounts[dk+(isAMSlot?'_AM':'_PM')]||0;W(recapRow,col,count>0?count:null,cellStyleCal(true,'D6E4F0','1F3864',9));}}

        // Légende
        const legendRow=recapRow+1;
        let tP=0,tA=0,tR=0,tRP=0,tNR=0,tAlert=0;
        for(const row of dfCons){const s=(row.statut||'').trim();if(s==='Planifié')tP++;else if(s==='Annulé')tA++;else if(s==='Réalisé')tR++;else if(s==='Reporté')tRP++;else if(s==='Non réalisé')tNR++;}
        for(let ri=titleRow;ri<=recapRow;ri++){if(!aoa[ri])continue;for(const cell of aoa[ri]){if(typeof cell==='string'&&cell.startsWith('⚠'))tAlert++;}}
        const lastLegendCol=DATE_START_COL+workingDays.length*2-1;const totalCols=lastLegendCol+1;
        const segments=[{label:`P | Prévus : ${tP}`,bg:'9683EC',fg:'FFFFFF'},{label:`A | Annulés : ${tA}`,bg:'FF5050',fg:'FFFFFF'},{label:`R | Réalisés : ${tR}`,bg:'70AD47',fg:'FFFFFF'},{label:`RP | Reportés : ${tRP}`,bg:'ED7D31',fg:'FFFFFF'},{label:`NR | Non réalisés : ${tNR}`,bg:'FFC000',fg:'7F4000'},{label:`⚠ | Alertes : ${tAlert}`,bg:'7B2FBE',fg:'FFFFFF'}];
        const nSeg=segments.length;const baseWidth=Math.floor(totalCols/nSeg);const remainder=totalCols-baseWidth*nSeg;
        const bThin=col=>({style:'thin',color:{rgb:col}});
        let colCursor=0;
        for(let si=0;si<nSeg;si++){const seg=segments[si];const width=baseWidth+(si<remainder?1:0);const colS=colCursor;const colE=colCursor+width-1;const segStyle={font:{name:'Calibri',sz:10,bold:true,color:{rgb:seg.fg}},fill:{fgColor:{rgb:'FF'+seg.bg},patternType:'solid'},alignment:{horizontal:'center',vertical:'center',wrapText:false},border:{top:bThin('999999'),bottom:bThin('999999'),left:bThin('CCCCCC'),right:bThin('CCCCCC')}};W(legendRow,colS,seg.label,segStyle);for(let c=colS+1;c<=colE;c++)W(legendRow,c,null,segStyle);if(colS<colE)merges.push({s:{r:legendRow,c:colS},e:{r:legendRow,c:colE}});colCursor+=width;}

        currentRow=legendRow+2;

        // Mention MàJ (dernier conseiller)
        const consNormCheck=conseiller.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        if(consNormCheck===conseillers[conseillers.length-1].trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')){
          const today=new Date();const dd=String(today.getDate()).padStart(2,'0');const mm=String(today.getMonth()+1).padStart(2,'0');const yyyy=today.getFullYear();
          W(currentRow,0,`mise a jour : ${dd}/${mm}/${yyyy}`,{font:{name:'Calibri',sz:9,italic:true,color:{rgb:'6B7280'}},alignment:{horizontal:'left',vertical:'center'}});
          currentRow+=2;
        }
      }

      // Largeurs colonnes
      const colInfo=[{wch:18},{wch:36}];
      for(let di=0;di<workingDays.length;di++)colInfo.push({wch:5},{wch:5});
      const ws=XLSX.utils.aoa_to_sheet(aoa);ws['!merges']=merges;ws['!cols']=colInfo;
      for(const[key,style]of Object.entries(styles)){const[r,c]=key.split(',').map(Number);const cellAddr=XLSX.utils.encode_cell({r,c});if(!ws[cellAddr])ws[cellAddr]={t:'s',v:''};ws[cellAddr].s=style;}
      XLSX.utils.book_append_sheet(wb,ws,`Planning ${String(month).padStart(2,'0')}-${year}`);
    }
    return wb;
  };

  // ── Surcharge VueAdmin — ajout section Export ──────────────────────────
  const _VueAdmin_orig=window.VueAdmin;
  window.VueAdmin=function VueAdmin(props){
    const{entries,annee,conseillersList}=props;
    // Fix #5 : persistance moisDeb/moisFin
    const[moisDeb,setMoisDeb]=React.useState(()=>parseInt(localStorage.getItem('cal_moisDeb')||'1'));
    const[moisFin,setMoisFin]=React.useState(()=>parseInt(localStorage.getItem('cal_moisFin')||'12'));
    function changeMoisDeb(v){localStorage.setItem('cal_moisDeb',v);setMoisDeb(v);setLastExport(null);}
    function changeMoisFin(v){localStorage.setItem('cal_moisFin',v);setMoisFin(v);setLastExport(null);}
    const[running,setRunning]=React.useState(false);
    const[xLogs,setXLogs]=React.useState([]);
    const[lastExport,setLastExport]=React.useState(null);

    function addXLog(msg,type='info'){setXLogs(l=>[...l,{msg,type,t:new Date().toLocaleTimeString('fr-FR')}]);}

    // Fix #7 : aperçu en temps réel
    const year=parseInt(annee||new Date().getFullYear());
    const previewMonths=[];for(let m=moisDeb;m<=moisFin;m++)previewMonths.push(m);
    const previewEntries=(entries||[]).filter(e=>{
      if(!e.date||!e.conseiller)return false;
      const mIso=String(e.date).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if(!mIso)return false;
      return parseInt(mIso[1])===year&&previewMonths.includes(parseInt(mIso[2]));
    });
    const previewCons=[...new Set(previewEntries.map(e=>e.conseiller))].length;
    const MOIS_SHORT=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

    async function handleExport(){
      setRunning(true);setXLogs([]);setLastExport(null);
      try{
        const year=parseInt(annee||new Date().getFullYear());
        // Fix #2 : guard mois (ne devrait pas arriver vu disabled, mais sécurité)
        if(moisDeb>moisFin)throw new Error('Mois de début postérieur au mois de fin.');
        const months=[];for(let m=moisDeb;m<=moisFin;m++)months.push(m);
        addXLog(`Traitement de ${entries.length} ateliers pour ${year}…`);
        const df=[];
        for(const e of entries){
          if(!e.date||!e.conseiller)continue;
          const s=String(e.date).trim();let d=null;
          const mFr=s.match(/^(?:\w+\s+)?(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
          if(mFr)d=new Date(Date.UTC(parseInt(mFr[3]),parseInt(mFr[2])-1,parseInt(mFr[1])));
          if(!d){const mIso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(mIso)d=new Date(Date.UTC(+mIso[1],+mIso[2]-1,+mIso[3]));}
          if(!d||isNaN(d.getTime()))continue;
          if(d.getUTCFullYear()!==year)continue;
          if(!months.includes(d.getUTCMonth()+1))continue;
          // ampm ignoré (stocké 'AM' par défaut dans GAS) — dérivé depuis l'horaire comme l'outil original
          df.push({date:d,horaire:e.horaire||'9H00',ampm:'',conseiller:String(e.conseiller).trim(),orienteur:String(e.orienteur||'').trim()||'—',statut:String(e.statut||'').trim()});
        }
        addXLog(`✓ ${df.length} ateliers valides`,'ok');
        // ── Diagnostic AM/PM (dérivé horaire) ──
        const nAM=df.filter(e=>isAMCal(e.horaire)).length;
        const nPM=df.length-nAM;
        addXLog(`AM/PM (via horaire) → AM:${nAM} · PM:${nPM}`,'ok');
        // ───────────────────────────────────────
        const cons=conseillersList||[];
        addXLog(`→ ${cons.length} conseillers : ${cons.join(', ')}`);
        if(df.length===0)throw new Error('Aucun atelier trouvé pour cette période. Vérifiez l\'année et les mois sélectionnés.');
        const wb=window.generateCalendrier(df,year,months,cons,addXLog);
        const outData=XLSX.write(wb,{type:'base64',bookType:'xlsx'});
        // Fix #1 : nom de fichier sans version hardcodée
        const fileName=`Calendrier_ateliers_${year}.xlsx`;
        const dataUrl='data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,'+outData;
        // Fix #3 : stocker pour le bouton de secours AVANT le click auto
        setLastExport({url:dataUrl,name:fileName});
        const a=document.createElement('a');a.href=dataUrl;a.download=fileName;document.body.appendChild(a);a.click();document.body.removeChild(a);
        addXLog(`✓ "${fileName}" téléchargé`,'ok');
      }catch(err){addXLog('✗ '+err.message,'err');console.error(err);}
      finally{setRunning(false);}
    }

    const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    const moisInvalid=moisDeb>moisFin;

    return CE(React.Fragment,null,
      CE(_VueAdmin_orig,props),
      CE('div',{className:'admin-section'},
        CE('h3',null,'📅 Export Timeline Ateliers'),
        CE('p',{style:{fontSize:12,color:'#4a5568',marginBottom:14}},'Génère le planning timeline directement depuis les données chargées. Année et conseillers pris depuis la sidebar.'),
        CE('div',{style:{display:'flex',gap:12,alignItems:'flex-end',flexWrap:'wrap',marginBottom:moisInvalid?6:10}},
          CE('div',null,
            CE('label',null,'Mois début'),
            CE('select',{value:moisDeb,onChange:e=>changeMoisDeb(+e.target.value),style:{marginTop:4}},
              MOIS.map((m,i)=>CE('option',{key:i,value:i+1},m))
            )
          ),
          CE('div',null,
            CE('label',null,'Mois fin'),
            CE('select',{value:moisFin,onChange:e=>changeMoisFin(+e.target.value),style:{marginTop:4}},
              MOIS.map((m,i)=>CE('option',{key:i,value:i+1},m))
            )
          ),
          CE('button',{
            className:'btn btn-success',
            style:{alignSelf:'flex-end'},
            disabled:running||moisInvalid||previewEntries.length===0,
            onClick:handleExport
          },running?CE('span',null,CE('span',{className:'spinner'}),'Génération…'):'📥 Générer & Télécharger')
        ),
        moisInvalid&&CE('p',{style:{fontSize:12,color:'#c53030',marginBottom:10,display:'flex',alignItems:'center',gap:6}},
          '⚠️ Le mois de début doit être antérieur ou égal au mois de fin.'
        ),
        // Fix #7 : aperçu en temps réel
        !moisInvalid&&CE('div',{style:{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}},
          CE('span',{style:{fontSize:12,background:'#ebf8ff',border:'1px solid #bee3f8',color:'#2b6cb0',borderRadius:6,padding:'3px 10px'}},
            `📊 ${previewEntries.length} atelier${previewEntries.length!==1?'s':''} · ${previewCons} conseiller${previewCons!==1?'s':''}`),
          CE('span',{style:{fontSize:12,background:'#f0fff4',border:'1px solid #9ae6b4',color:'#276749',borderRadius:6,padding:'3px 10px'}},
            `📅 ${MOIS_SHORT[moisDeb-1]} → ${MOIS_SHORT[moisFin-1]} ${year}`)
        ),
        xLogs.length>0&&CE('div',{style:{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:8,padding:'10px 14px',maxHeight:160,overflowY:'auto',fontSize:12}},
          xLogs.map((l,i)=>CE('div',{key:i,className:`log-entry log-${l.type}`,style:{marginBottom:4}},
            CE('span',{className:'log-time'},l.t+' '),
            CE('span',null,l.msg)
          ))
        ),
        // Fix #3 : bouton de secours si le téléchargement auto a échoué (Safari, Firefox strict…)
        lastExport&&CE('div',{style:{marginTop:10,padding:'10px 14px',background:'#f0fff4',border:'1px solid #9ae6b4',borderRadius:8,display:'flex',alignItems:'center',gap:10,fontSize:13}},
          CE('span',null,'📎 Si le téléchargement ne s\'est pas lancé :'),
          CE('a',{href:lastExport.url,download:lastExport.name,style:{color:'#276749',fontWeight:700,textDecoration:'underline'}},lastExport.name)
        )
      ),
      // v9.4 : changement de mot de passe admin
      CE(ChangerMotDePasse,null)
    );
  };

  function ChangerMotDePasse(){
    const[pwd,setPwd]=React.useState('');
    const[pwd2,setPwd2]=React.useState('');
    const[saving,setSaving]=React.useState(false);
    const[msg,setMsg]=React.useState(null);

    async function handleSave(){
      if(pwd.length<4){setMsg({ok:false,txt:'4 caractères minimum'});return;}
      if(pwd!==pwd2){setMsg({ok:false,txt:'Les mots de passe ne correspondent pas'});return;}
      setSaving(true);setMsg(null);
      try{
        const res=await apiFetch('setPassword',{pwd});
        if(res.ok){setMsg({ok:true,txt:'✅ Mot de passe mis à jour'});setPwd('');setPwd2('');}
        else setMsg({ok:false,txt:res.error||'Erreur'});
      }catch(e){setMsg({ok:false,txt:'Erreur réseau'});}
      finally{setSaving(false);}
    }

    return CE('div',{className:'admin-section'},
      CE('h3',null,'🔑 Changer le mot de passe admin'),
      CE('div',{style:{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}},
        CE('div',null,
          CE('label',null,'Nouveau mot de passe'),
          CE('input',{type:'password',value:pwd,onChange:e=>setPwd(e.target.value),placeholder:'Min. 4 caractères',style:{marginTop:4,display:'block',padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:6,fontSize:13}})
        ),
        CE('div',null,
          CE('label',null,'Confirmer'),
          CE('input',{type:'password',value:pwd2,onChange:e=>setPwd2(e.target.value),placeholder:'Répéter',style:{marginTop:4,display:'block',padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:6,fontSize:13}})
        ),
        CE('button',{className:'btn btn-primary',disabled:saving||!pwd||!pwd2,onClick:handleSave,style:{alignSelf:'flex-end'}},saving?'Sauvegarde…':'💾 Sauvegarder')
      ),
      msg&&CE('p',{style:{marginTop:8,fontSize:13,color:msg.ok?'#276749':'#c53030'}},msg.txt)
    );
  }

})();

<script>
// ── Login admin via GAS (v9.4 — hash supprimé du client) ──
function AdminLogin({onLogin}){
  const[pwd,setPwd]=React.useState('');
  const[err,setErr]=React.useState('');
  const[loading,setLoading]=React.useState(false);

  async function handleSubmit(){
    if(!pwd.trim())return;
    setLoading(true);setErr('');
    try{
      const res=await Promise.race([
        apiFetch('checkPassword',{pwd}),
        new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),15000))
      ]);
      if(res.ok)onLogin();
      else setErr(res.error||'Mot de passe incorrect');
    }catch(e){setErr('Erreur réseau : '+e.message);}
    finally{setLoading(false);}
  }

  return CE('div',{className:'login-wrap'},
    CE('div',{className:'login-card'},
      CE('h2',null,'🔐 Accès Admin'),
      CE('input',{
        type:'password',placeholder:'Mot de passe',value:pwd,
        onChange:e=>setPwd(e.target.value),
        onKeyDown:e=>e.key==='Enter'&&handleSubmit(),
        style:{width:'100%',padding:'10px 14px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:14,marginBottom:10,outline:'none'}
      }),
      err&&CE('p',{style:{color:'#c53030',fontSize:13,marginBottom:8}},err),
      CE('button',{
        onClick:handleSubmit,disabled:loading||!pwd.trim(),
        style:{width:'100%',padding:'11px',background:'#1e3a8a',color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:700,cursor:'pointer'}
      },loading?'Vérification…':'Connexion')
    )
  );
}

// ── v9.3 : labels des vues ─────────────────────────────────
var VIEW_META = {
  saisie:     { ico: '✏️',  label: 'Saisie',      group: 'Action' },
  historique: { ico: '📋',  label: 'Historique',   group: 'Consulter' },
  calendrier: { ico: '📅',  label: 'Calendrier',   group: 'Consulter' },
  carte:      { ico: '🗺️', label: 'Carte',        group: 'Consulter' },
  graphiques: { ico: '📊',  label: 'Statistiques', group: 'Analyser' },
  bingo:      { ico: '🎯',  label: 'Bingo',        group: 'Analyser' },
  admin:      { ico: '⚙️', label: 'Admin',        group: 'Config' },
  logs:       { ico: '📜',  label: 'Logs',         group: 'Config' },
};

// ── App Admin ──────────────────────────────────────────────
function App(){
  const[auth,setAuth]           = React.useState(false);
  const[adminConseiller,setAdminConseiller]= React.useState(()=>localStorage.getItem('adm_conseiller')||'');
  const[view,setView]           = React.useState('historique');
  const[entries,setEntries]= React.useState([]);
  const[loading,setLoading]= React.useState(true);
  const[error,setError]    = React.useState(null);
  const[logs,setLogs]      = React.useState([]);
  const[newEntries,setNewEntries]= React.useState([]);
  const[seenIds,setSeenIds]= React.useState(new Set());
  const[showListes,setShowListes]= React.useState(false);
  const[editingId,setEditingId]  = React.useState(null);
  const[prefillData,setPrefillData]= React.useState(null);
  const[annee,setAnnee]    = React.useState(String(new Date().getFullYear()));
  const[lists,setLists]    = React.useState({
    statuts:[...STATUTS_DEFAULT],conseillers:[...CONSEILLERS_DEFAULT],
    publics:[...PUBLICS_DEFAULT],materiels:[...MATERIELS_DEFAULT]
  });
  const[emails,setEmails]  = React.useState({});  // v9.3
  const[lastSync,setLastSync]= React.useState(null); // v9.4

  function addLog(msg,type='info'){const t=new Date().toLocaleTimeString('fr-FR');setLogs(l=>[{msg,type,t},...l].slice(0,50));}

  async function loadData(attempt=1){
    setLoading(true);setError(null);
    try{
      // Timeout adaptatif : court sur PC/fibre, long sur mobile/4G
      const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);
      const timeouts=isMobile?[20000,25000,30000]:[8000,10000,12000];
      const timeoutMs=timeouts[attempt-1]||timeouts[timeouts.length-1];
      const res=await Promise.race([fetch(`${GS_URL}?action=getAll&year=${annee}`),new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),timeoutMs))]);
      const data=await res.json();
      if(!data.ok)throw new Error(data.error||'Erreur serveur');
      const incoming=data.entries||[];
      setEntries(incoming);
      if(data.lists){
        const l=data.lists;
        const nl={statuts:Array.isArray(l.statuts)?l.statuts:[...STATUTS_DEFAULT],conseillers:Array.isArray(l.conseillers)?l.conseillers:[...CONSEILLERS_DEFAULT],publics:Array.isArray(l.publics)?l.publics:[...PUBLICS_DEFAULT],materiels:Array.isArray(l.materiels)?l.materiels:[...MATERIELS_DEFAULT]};
        setLists(nl);STATUTS=[...nl.statuts];CONSEILLERS=[...nl.conseillers];PUBLICS=[...nl.publics];MATERIELS=[...nl.materiels];
        addLog('Listes synchronisées','ok');
      }
      if(data.conseiller_colors){applyColors(data.conseiller_colors);}
      if(data.emails){setEmails(data.emails);addLog('Emails chargés','ok');}  // v9.3
      addLog(`${incoming.length} ateliers chargés (${annee})`,'ok');
      setLastSync(new Date());
      setSeenIds(prev=>{if(prev.size===0)return new Set(incoming.map(e=>e._id));const nouvs=incoming.filter(e=>!prev.has(e._id));if(nouvs.length>0)setNewEntries(n=>[...nouvs,...n]);return new Set(incoming.map(e=>e._id));});
      setLoading(false);
    }catch(err){
      if(err.message==='timeout'&&attempt<3){addLog(`Tentative ${attempt}/3…`,'info');const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);setTimeout(()=>loadData(attempt+1),isMobile?[3000,6000][attempt-1]:2000);}
      else{setError(attempt>1?'Google Sheets ne répond pas après 3 tentatives.':'Impossible de charger : '+err.message);addLog('Erreur : '+err.message,'err');setLoading(false);}
    }
  }

  const isFirstLoad=React.useRef(true);
  React.useEffect(()=>{loadCommunes47().catch(()=>{});},[]);
  React.useEffect(()=>{
    if(isFirstLoad.current){isFirstLoad.current=false;loadData();}
    else{setSeenIds(new Set());loadData();}
  },[annee]);
  // v9.4 : sync auto toutes les 5 min
  React.useEffect(()=>{
    const id=setInterval(()=>loadData(),5*60*1000);
    return()=>clearInterval(id);
  },[annee]);

  async function handleDelete(id){
    try{const res=await apiFetch('delete',{_id:id});if(!res.ok)throw new Error(res.error);showToast('✅ Atelier supprimé');addLog('Suppression '+id,'ok');loadData();}
    catch(err){showToast('❌ '+err.message,false);}
  }

  function handleEdit(id){setEditingId(id);setPrefillData(null);setView('saisie');}
  function handleSaved(){loadData();setView('historique');}

  function handleDuplicate(entry){
    const{_id,_n,date,horaire,ampm,inscrits,presents,remarques,...rest}=entry;
    setPrefillData({...rest});setEditingId(null);setView('saisie');
  }

  function handleSaveLists(newLists){
    setLists(newLists);STATUTS=[...newLists.statuts];CONSEILLERS=[...newLists.conseillers];PUBLICS=[...newLists.publics];MATERIELS=[...newLists.materiels];
  }

  function handleSaveEmails(newEmails){  // v9.3
    setEmails(newEmails);
  }

  if(!auth)return CE(AdminLogin,{onLogin:()=>setAuth(true)});

  if(!adminConseiller)return CE('div',{className:'login-wrap'},
    CE('div',{className:'login-card'},
      CE('h2',null,'👤 Qui êtes-vous ?'),
      CE('p',{style:{fontSize:13,color:'#718096',margin:'8px 0 20px'}},'Pour personnaliser votre interface'),
      (lists.conseillers||CONSEILLERS_DEFAULT).map(c=>
        CE('button',{key:c,onClick:()=>{localStorage.setItem('adm_conseiller',c);setAdminConseiller(c);},
          style:{display:'block',width:'100%',marginBottom:10,padding:'11px 16px',border:`2px solid ${conseillerColor(c)}22`,borderRadius:10,background:`${conseillerColor(c)}11`,color:conseillerColor(c),fontSize:14,fontWeight:700,cursor:'pointer',textAlign:'left',transition:'all .15s'}},
          CE('span',{style:{display:'inline-block',width:10,height:10,borderRadius:'50%',background:conseillerColor(c),marginRight:8}}),c)
      ),
      CE('button',{onClick:()=>{localStorage.setItem('adm_conseiller','admin');setAdminConseiller('admin');},style:{display:'block',width:'100%',padding:'11px 16px',border:'2px solid #e2e8f0',borderRadius:10,background:'#f8fafc',color:'#718096',fontSize:13,cursor:'pointer',marginTop:4}},'Continuer sans personnalisation')
    )
  );

  const sideBtn=(v,ico,lbl,extraClass)=>CE('button',{
    key:v,
    className:'sidebar-btn'+(view===v?' active':'')+(extraClass?' '+extraClass:''),
    title:lbl,
    onClick:()=>setView(v)
  },
    CE('span',{className:'sidebar-btn-ico'},ico),
    CE('span',{className:'sidebar-btn-lbl'},lbl)
  );

  const accentColor = conseillerColor(adminConseiller)||NAV_DEFAULT_COLOR;
  const meta = VIEW_META[view]||{ico:'📄',label:view,group:''};

  return CE('div',{className:'app-shell'},

    CE('aside',{className:'sidebar',style:{background:accentColor}},

      CE('div',{className:'sidebar-logo'},'🖥️'),
      CE('span',{className:'sidebar-count'},entries.length),
      CE('span',{className:'sidebar-admin-badge'},'ADMIN'),

      // Groupe : Action
      CE('div',{className:'sidebar-sep'}),
      CE('span',{className:'sidebar-group-label'},'Action'),
      sideBtn('saisie','✏️','Saisie'),

      // Groupe : Voir
      CE('div',{className:'sidebar-sep'}),
      CE('span',{className:'sidebar-group-label'},'Voir'),
      sideBtn('historique','📋','Historique'),
      sideBtn('calendrier','📅','Calendrier'),
      sideBtn('carte','🗺️','Carte'),

      // Groupe : Stats
      CE('div',{className:'sidebar-sep'}),
      CE('span',{className:'sidebar-group-label'},'Stats'),
      sideBtn('graphiques','📊','Statistiques'),
      sideBtn('bingo','🎯','Bingo'),

      // Groupe : Config — Listes ICI (remonté v9.3b)
      CE('div',{className:'sidebar-sep'}),
      CE('span',{className:'sidebar-group-label'},'Config'),
      CE('button',{
        className:'sidebar-btn sidebar-btn-listes',
        title:'Gérer les listes déroulantes',
        onClick:()=>setShowListes(true)
      },
        CE('span',{className:'sidebar-btn-ico'},'📋'),
        CE('span',{className:'sidebar-btn-lbl'},'Listes')
      ),
      sideBtn('admin','⚙️','Admin'),
      sideBtn('logs','📜','Logs'),

      // Bas : sélecteur année + notifs
      CE('div',{className:'sidebar-bottom'},
        CE('select',{
          className:'sidebar-year',
          value:annee,
          onChange:e=>setAnnee(e.target.value),
          title:'Année chargée'
        },
          [String(new Date().getFullYear()-1),String(new Date().getFullYear()),String(new Date().getFullYear()+1)]
            .map(y=>CE('option',{key:y,value:y},y))
        ),
        newEntries.length>0&&CE('button',{
          className:'sidebar-notif-btn',
          title:`${newEntries.length} nouveaux ateliers`,
          onClick:()=>{setView('historique');window._filterNewEntries&&window._filterNewEntries(newEntries.map(e=>e._id));setNewEntries([]);}
        },
          CE('span',null,'🔔'),
          CE('span',null,newEntries.length)
        )
      )
    ),

    CE('div',{className:'app-content'},

      CE('div',{className:'app-topbar'},
        CE('span',{style:{fontSize:16}},meta.ico),
        CE('span',{className:'app-topbar-title'},meta.label),
        meta.group&&CE('span',{className:'app-topbar-sub'},'— '+meta.group),
        CE('div',{className:'app-topbar-right'},
          lastSync&&CE('span',{
            className:'topbar-sync-info',
            title:'Sync auto toutes les 5 min'
          },'🔄 '+lastSync.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})),
          adminConseiller&&adminConseiller!=='admin'&&CE('span',{
            className:'app-topbar-conseiller',
            style:{background:accentColor}
          },adminConseiller),
          CE('button',{
            onClick:()=>{localStorage.removeItem('adm_conseiller');setAdminConseiller('');},
            title:'Changer d\'identité',
            style:{background:'none',border:'1px solid #e2e8f0',borderRadius:6,padding:'3px 8px',fontSize:11,color:'#718096',cursor:'pointer'}
          },'👤 Changer')
        )
      ),

      CE('div',{className:'app-main'},
        loading&&CE('div',{className:'loading-full'},CE('div',{className:'big-spin'}),CE('span',null,'Chargement…')),
        error&&CE('div',{className:'error-box'},CE('strong',null,'❌ Impossible de charger'),CE('span',null,error),CE('button',{className:'btn btn-primary',onClick:loadData},'🔄 Réessayer')),
        !loading&&!error&&CE('div',null,
          view==='saisie'&&CE(VueSaisie,{entries,onSaved:handleSaved,onNewEntry:e=>{setNewEntries(n=>[e,...n]);setSeenIds(s=>{const ns=new Set(s);ns.add(e._id);return ns;});},lists,editingId,onClearEdit:()=>setEditingId(null),prefillData,onClearPrefill:()=>setPrefillData(null),accentColor:conseillerColor(adminConseiller)}),
          view==='historique'&&CE(VueHistorique,{entries,onEdit:handleEdit,onDelete:handleDelete,onRefresh:loadData,onDuplicate:handleDuplicate,canDelete:true}),
          view==='calendrier'&&CE(VueCalendrier,{entries,onEdit:handleEdit,onDelete:handleDelete,onRefresh:loadData,onDuplicate:handleDuplicate,canDelete:true}),
          view==='graphiques'&&CE(VueGraphiques,{entries}),
          view==='carte'&&CE(VueCarte,{entries,active:view==='carte'}),
          view==='bingo'&&CE(VueBingo,{entries}),
          view==='admin'&&CE(VueAdmin,{entries,onRefresh:loadData,addLog,conseillersList:lists.conseillers,onSaveColors:(c)=>{applyColors(c);},annee}),
          view==='logs'&&CE('div',{className:'card'},
            CE('h2',null,'📜 Journal des opérations'),
            logs.length===0?CE('p',{style:{color:'#718096',fontSize:13}},'Aucune opération.'):logs.map((l,i)=>CE('div',{key:i,className:`log-entry log-${l.type}`},CE('span',{className:'log-time'},l.t),CE('span',null,l.msg)))
          )
        )
      )
    ),

    // Modale listes — avec emails v9.3
    showListes&&CE(VueListes,{
      lists,
      onSave:handleSaveLists,
      onClose:()=>setShowListes(false),
      emails,                        // v9.3
      onSaveEmails:handleSaveEmails  // v9.3
    }),
    CE('div',{id:'toast',className:'toast',style:{opacity:0}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(CE(App));
</script>
</body>
