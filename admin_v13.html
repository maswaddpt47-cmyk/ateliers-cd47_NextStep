<script>
// ── Export Calendrier — injecté dans VueAdmin ──────────────────────────────
(function(){

  // ── Helpers generateCalendrier ─────────────────────────────────────────
  const MONTH_NAMES_FR_CAL={1:'JANVIER',2:'FÉVRIER',3:'MARS',4:'AVRIL',5:'MAI',6:'JUIN',7:'JUILLET',8:'AOÛT',9:'SEPTEMBRE',10:'OCTOBRE',11:'NOVEMBRE',12:'DÉCEMBRE'};
  const DAY_FR_CAL=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const STATUT_COLORS_CAL={'Réalisé':'70AD47','Annulé':'FF5050','Planifié':'9683EC','Non réalisé':'FFC000','Reporté':'ED7D31'};
  const STATUT_SYMBOLS_CAL={'Réalisé':'R','Annulé':'A','Planifié':'P','Non réalisé':'NR','Reporté':'RP'};

  function isAMCal(h){try{return parseInt(String(h).replace('H',':').split(':')[0])<12;}catch{return true;}}
  function getWorkingDaysCal(year,month){const days=[];const d=new Date(Date.UTC(year,month-1,1));while(d.getUTCMonth()===month-1){if(d.getUTCDay()!==0&&d.getUTCDay()!==6)days.push(new Date(d));d.setUTCDate(d.getUTCDate()+1);}return days;}
  function dateKeyCal(d){return`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;}
  function argbOfCal(hex){return'FF'+hex.toUpperCase();}

  function cellStyleCal(bold=false,bgHex=null,fgHex='000000',sz=8){
    const s={font:{bold,sz,color:{rgb:fgHex}},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:{top:{style:'thin',color:{rgb:'AAAAAA'}},bottom:{style:'thin',color:{rgb:'AAAAAA'}},left:{style:'thin',color:{rgb:'AAAAAA'}},right:{style:'thin',color:{rgb:'AAAAAA'}}}};
    if(bgHex)s.fill={fgColor:{rgb:argbOfCal(bgHex)},patternType:'solid'};return s;
  }
  function cellStyleLeftCal(bold=false,bgHex=null,fgHex='000000',sz=8){
    const s={font:{bold,sz,color:{rgb:fgHex}},alignment:{horizontal:'left',vertical:'center'},border:{top:{style:'thin',color:{rgb:'AAAAAA'}},bottom:{style:'thin',color:{rgb:'AAAAAA'}},left:{style:'thin',color:{rgb:'AAAAAA'}},right:{style:'thin',color:{rgb:'AAAAAA'}}}};
    if(bgHex)s.fill={fgColor:{rgb:argbOfCal(bgHex)},patternType:'solid'};return s;
  }

  window.generateCalendrier=function(df,year,months,conseillers,logFn){
    const wb=XLSX.utils.book_new();
    for(const month of months){
      const monthName=MONTH_NAMES_FR_CAL[month];
      const workingDays=getWorkingDaysCal(year,month);
      const dfMonth=df.filter(r=>r.date.getUTCFullYear()===year&&r.date.getUTCMonth()+1===month);
      const aoa=[];const merges=[];const styles={};
      let currentRow=0;
      function S(r,c,style){styles[`${r},${c}`]=style;}
      function W(r,c,v,style){while(aoa.length<=r)aoa.push([]);while(aoa[r].length<=c)aoa[r].push(null);aoa[r][c]=v;if(style)S(r,c,style);}
      const DATE_START_COL=2;

      for(const conseiller of conseillers){
        const consNorm=conseiller.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        const dfCons=dfMonth.filter(r=>{const rn=(r.conseiller||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');return rn===consNorm;});
        const recapCounts={};
        for(const row of dfCons){const am=row.ampm?row.ampm==='AM':isAMCal(row.horaire);const dk=dateKeyCal(row.date)+(am?'_AM':'_PM');recapCounts[dk]=(recapCounts[dk]||0)+1;}
        function normOrg(s){return String(s||'—').trim().replace(/\s+/g,' ').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
        const seenOrgsKeys=[];const seenOrgs=[];
        for(const row of dfCons){const raw=String(row.orienteur||'—').trim().replace(/\s+/g,' ');const key=normOrg(raw);if(!seenOrgsKeys.includes(key)){seenOrgsKeys.push(key);seenOrgs.push(raw);}}
        const nDataRows=Math.max(1,seenOrgs.length);
        const orgSessions={};
        for(const row of dfCons){const key=normOrg(row.orienteur||'—');if(!orgSessions[key])orgSessions[key]=[];orgSessions[key].push(row);}

        // Titre
        const titleRow=currentRow;
        const titleLastCol=DATE_START_COL+workingDays.length*2-1;
        const titleStyle={font:{bold:true,sz:26,name:'Calibri',color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'FF8DB4E2'},patternType:'solid'},alignment:{horizontal:'center',vertical:'center'}};
        W(titleRow,0,`PLANNING ATELIERS — ${conseiller.toUpperCase()}`,titleStyle);
        for(let c=1;c<=titleLastCol;c++)W(titleRow,c,null,titleStyle);
        merges.push({s:{r:titleRow,c:0},e:{r:titleRow,c:titleLastCol}});currentRow++;

        // Sous-titre mois
        const subRow=currentRow;
        const subStyle={font:{bold:true,sz:18,name:'Calibri',color:{rgb:'16365C'}},fill:{fgColor:{rgb:'FFC5D9F1'},patternType:'solid'},alignment:{horizontal:'center',vertical:'center'}};
        W(subRow,0,`${monthName} ${year}`,subStyle);
        for(let c=1;c<=titleLastCol;c++)W(subRow,c,null,subStyle);
        merges.push({s:{r:subRow,c:0},e:{r:subRow,c:titleLastCol}});currentRow++;

        // En-tête jours
        const hrow=currentRow;
        W(hrow,0,'CoNum',cellStyleCal(true,'1F4E79','FFFFFF',9));
        W(hrow,1,'Organisme',cellStyleCal(true,'1F4E79','FFFFFF',9));
        for(let di=0;di<workingDays.length;di++){const day=workingDays[di];const colAM=DATE_START_COL+di*2;const label=`${DAY_FR_CAL[day.getDay()]} ${String(day.getDate()).padStart(2,'0')}`;W(hrow,colAM,label,cellStyleCal(true,'2E75B6','FFFFFF',8));W(hrow,colAM+1,null,cellStyleCal(true,'2E75B6','FFFFFF',8));merges.push({s:{r:hrow,c:colAM},e:{r:hrow,c:colAM+1}});}
        currentRow++;

        // AM/PM
        const srow=currentRow;
        W(srow,0,null,cellStyleCal(false,null,'000000',8));W(srow,1,null,cellStyleCal(false,null,'000000',8));
        for(let di=0;di<workingDays.length;di++){const colAM=DATE_START_COL+di*2;W(srow,colAM,'AM',cellStyleCal(true,'BDD7EE','1F3864',8));W(srow,colAM+1,'PM',cellStyleCal(true,'9DC3E6','1F3864',8));}
        currentRow++;

        // Lignes données
        for(let oi=0;oi<nDataRows;oi++){
          const rn=currentRow+oi;const org=seenOrgs[oi]||'';
          W(rn,0,conseiller,cellStyleCal(false,null,'000000',8));W(rn,1,org,cellStyleLeftCal(false,null,'000000',8));
          const creneau={};
          for(const sess of(orgSessions[normOrg(org)]||[])){const am=sess.ampm?sess.ampm==='AM':isAMCal(sess.horaire);const ck=dateKeyCal(sess.date)+(am?'_AM':'_PM');if(!creneau[ck])creneau[ck]=[];creneau[ck].push(sess);}
          for(let di=0;di<workingDays.length;di++){
            const day=workingDays[di];const dk=dateKeyCal(day);const colAM=DATE_START_COL+di*2;
            for(const[suffix,col]of[['_AM',colAM],['_PM',colAM+1]]){
              const ck=dk+suffix;
              if(creneau[ck]){const list=creneau[ck];if(list.length===1){const s=list[0].statut;W(rn,col,STATUT_SYMBOLS_CAL[s]||(s?s.slice(0,2):'?'),cellStyleCal(true,STATUT_COLORS_CAL[s]||'D9D9D9','000000',8));}else{W(rn,col,`⚠×${list.length}`,cellStyleCal(true,'7B2FBE','FFFFFF',7));if(logFn)logFn(`⚠ Conflit ${conseiller} | ${org} | ${dk} ${suffix.slice(1)} (${list.length} sessions)`,'err');}}
              else W(rn,col,null,cellStyleCal(false));
            }
          }
        }

        // Recap
        const recapRow=currentRow+nDataRows;
        W(recapRow,0,conseiller,cellStyleLeftCal(true,'D6E4F0','1F3864',8));
        W(recapRow,1,`RECAP ${monthName}`,cellStyleLeftCal(true,'D6E4F0','1F3864',8));
        for(let di=0;di<workingDays.length;di++){const dk=dateKeyCal(workingDays[di]);const colAM=DATE_START_COL+di*2;for(const[isAMSlot,col]of[[true,colAM],[false,colAM+1]]){const count=recapCounts[dk+(isAMSlot?'_AM':'_PM')]||0;W(recapRow,col,count>0?count:null,cellStyleCal(true,'D6E4F0','1F3864',9));}}

        // Légende
        const legendRow=recapRow+1;
        let tP=0,tA=0,tR=0,tRP=0,tNR=0,tAlert=0;
        for(const row of dfCons){const s=(row.statut||'').trim();if(s==='Planifié')tP++;else if(s==='Annulé')tA++;else if(s==='Réalisé')tR++;else if(s==='Reporté')tRP++;else if(s==='Non réalisé')tNR++;}
        for(let ri=titleRow;ri<=recapRow;ri++){if(!aoa[ri])continue;for(const cell of aoa[ri]){if(typeof cell==='string'&&cell.startsWith('⚠'))tAlert++;}}
        const lastLegendCol=DATE_START_COL+workingDays.length*2-1;const totalCols=lastLegendCol+1;
        const segments=[{label:`P | Prévus : ${tP}`,bg:'9683EC',fg:'FFFFFF'},{label:`A | Annulés : ${tA}`,bg:'FF5050',fg:'FFFFFF'},{label:`R | Réalisés : ${tR}`,bg:'70AD47',fg:'FFFFFF'},{label:`RP | Reportés : ${tRP}`,bg:'ED7D31',fg:'FFFFFF'},{label:`NR | Non réalisés : ${tNR}`,bg:'FFC000',fg:'7F4000'},{label:`⚠ | Alertes : ${tAlert}`,bg:'7B2FBE',fg:'FFFFFF'}];
        const nSeg=segments.length;const baseWidth=Math.floor(totalCols/nSeg);const remainder=totalCols-baseWidth*nSeg;
        const bThin=col=>({style:'thin',color:{rgb:col}});
        let colCursor=0;
        for(let si=0;si<nSeg;si++){const seg=segments[si];const width=baseWidth+(si<remainder?1:0);const colS=colCursor;const colE=colCursor+width-1;const segStyle={font:{name:'Calibri',sz:10,bold:true,color:{rgb:seg.fg}},fill:{fgColor:{rgb:'FF'+seg.bg},patternType:'solid'},alignment:{horizontal:'center',vertical:'center',wrapText:false},border:{top:bThin('999999'),bottom:bThin('999999'),left:bThin('CCCCCC'),right:bThin('CCCCCC')}};W(legendRow,colS,seg.label,segStyle);for(let c=colS+1;c<=colE;c++)W(legendRow,c,null,segStyle);if(colS<colE)merges.push({s:{r:legendRow,c:colS},e:{r:legendRow,c:colE}});colCursor+=width;}

        currentRow=legendRow+2;

        // Mention MàJ (dernier conseiller)
        const consNormCheck=conseiller.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        if(consNormCheck===conseillers[conseillers.length-1].trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')){
          const today=new Date();const dd=String(today.getDate()).padStart(2,'0');const mm=String(today.getMonth()+1).padStart(2,'0');const yyyy=today.getFullYear();
          W(currentRow,0,`mise a jour : ${dd}/${mm}/${yyyy}`,{font:{name:'Calibri',sz:9,italic:true,color:{rgb:'6B7280'}},alignment:{horizontal:'left',vertical:'center'}});
          currentRow+=2;
        }
      }

      // Largeurs colonnes
      const colInfo=[{wch:18},{wch:36}];
      for(let di=0;di<workingDays.length;di++)colInfo.push({wch:5},{wch:5});
      const ws=XLSX.utils.aoa_to_sheet(aoa);ws['!merges']=merges;ws['!cols']=colInfo;
      for(const[key,style]of Object.entries(styles)){const[r,c]=key.split(',').map(Number);const cellAddr=XLSX.utils.encode_cell({r,c});if(!ws[cellAddr])ws[cellAddr]={t:'s',v:''};ws[cellAddr].s=style;}
      XLSX.utils.book_append_sheet(wb,ws,`Planning ${String(month).padStart(2,'0')}-${year}`);
    }
    return wb;
  };

})();
</script>

<script>
// ════════════════════════════════════════════════════════════
// ── v10.0 : Override apiFetch — retry automatique sur GAS ──
// Remplace la version de shared.js (10s, sans retry).
// Comportement : 1 retry auto après 3s sur timeout, timeout
// adaptatif mobile/PC, log console discret.
// ════════════════════════════════════════════════════════════
(function(){
  const MAX_RETRY    = 1;
  const RETRY_DELAY  = 3000;   // ms avant le retry
  const isMobile     = /Android|iPhone|iPad/i.test(navigator.userAgent);
  const TIMEOUT_MS   = isMobile ? 20000 : 12000;

  window.apiFetch = async function apiFetch(action, body={}, _attempt=1){
    const params = new URLSearchParams({action});
    if(body && Object.keys(body).length){
      Object.entries(body).forEach(([k,v])=>{
        params.set(k, typeof v==='object' ? JSON.stringify(v) : v);
      });
    }
    try{
      const res = await Promise.race([
        fetch(`${GS_URL}?${params.toString()}`),
        new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')), TIMEOUT_MS))
      ]);
      return res.json();
    }catch(err){
      if(err.message==='timeout' && _attempt <= MAX_RETRY){
        console.warn(`[apiFetch v10] Timeout "${action}" — retry ${_attempt}/${MAX_RETRY} dans ${RETRY_DELAY/1000}s`);
        await new Promise(r=>setTimeout(r, RETRY_DELAY));
        return window.apiFetch(action, body, _attempt + 1);
      }
      // Si toujours en timeout après retry, message clair
      if(err.message==='timeout')
        throw new Error('Le serveur ne répond pas (GAS cold start ?) — réessaie dans quelques secondes.');
      throw err;
    }
  };
})();

// ════════════════════════════════════════════════════════════
// ── v10.0 : Session expirante — 30 min d'inactivité ────────
// Stocke le timestamp du dernier geste utilisateur.
// Vérifié à chaque reprise du focus + toutes les minutes.
// Sur expiration : déconnexion propre + toast informatif.
// ════════════════════════════════════════════════════════════
const SESSION_KEY        = 'adm_last_activity';
const SESSION_TIMEOUT_MS = 30 * 60 * 1000; // 30 min

function touchSession(){
  localStorage.setItem(SESSION_KEY, String(Date.now()));
}
function isSessionExpired(){
  const last = parseInt(localStorage.getItem(SESSION_KEY) || '0', 10);
  return last > 0 && (Date.now() - last) > SESSION_TIMEOUT_MS;
}
function clearSession(){
  localStorage.removeItem(SESSION_KEY);
}

// ════════════════════════════════════════════════════════════
// ── v10.0 : AdminLogin avec anti-brute force ───────────────
// 3 échecs → blocage 5 min, countdown visible, reset auto.
// ════════════════════════════════════════════════════════════
function AdminLogin({onLogin,savedName,onResetProfil}){
  const MAX_FAILS=3, LOCK_MS=5*60*1000; // v10.0 : mémoire React uniquement, pas localStorage

  const[pwd,setPwd]=React.useState('');
  const[err,setErr]=React.useState('');
  const[loading,setLoading]=React.useState(false);
  const[hint,setHint]=React.useState('');
  const[show,setShow]=React.useState(false);
  const[failCount,setFailCount]=React.useState(0);
  const[lockUntil,setLockUntil]=React.useState(0);
  const[countdown,setCountdown]=React.useState(0);

  // Tick du countdown
  React.useEffect(()=>{
    if(!lockUntil||lockUntil<=Date.now()) return;
    const tick=()=>{
      const left=lockUntil-Date.now();
      if(left<=0){setCountdown(0);setLockUntil(0);setFailCount(0);}
      else setCountdown(Math.ceil(left/1000));
    };
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[lockUntil]);

  const isLocked=lockUntil>Date.now()||countdown>0;

  async function handleSubmit(){
    if(!pwd.trim()||isLocked) return;
    setLoading(true);setErr('');setHint('');
    const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);
    const t1=setTimeout(()=>setHint('Connexion au serveur…'),2000);
    const t2=setTimeout(()=>setHint('Démarrage de Google Apps Script…'),6000);
    const t3=isMobile?setTimeout(()=>setHint('Réseau mobile détecté, patience…'),12000):null;
    try{
      const res=await Promise.race([
        apiFetch('checkPassword',{pwd}),
        new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),isMobile?25000:10000))
      ]);
      if(res.ok){
        
        setFailCount(0);setLockUntil(0);
        touchSession();onLogin();
      }else{
        const nf=failCount+1;
        setFailCount(nf);
        if(nf>=MAX_FAILS){
          const until=Date.now()+LOCK_MS;
          setLockUntil(until);
          setErr('🔒 Trop de tentatives — accès bloqué 5 minutes.');
        }else{
          setErr(`Mot de passe incorrect (${nf}/${MAX_FAILS} tentative${nf>1?'s':''})`);
        }
      }
    }catch(e){setErr('Erreur réseau : '+e.message);}
    finally{setLoading(false);setHint('');clearTimeout(t1);clearTimeout(t2);if(t3)clearTimeout(t3);}
  }

  const mins=Math.floor(countdown/60), secs=String(countdown%60).padStart(2,'0');

  return CE('div',{className:'login-wrap'},
    CE('div',{className:'login-card'},
      CE('h2',null,'🔐 Accès Admin'),
      savedName&&savedName!=='admin'&&CE('div',{style:{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:8,padding:'8px 12px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:12}},
        CE('span',{style:{color:'#1e3a8a',fontWeight:700}},'👤 Connecté en tant que : '+savedName),
        CE('button',{onClick:onResetProfil,style:{background:'none',border:'none',color:'#9ca3af',cursor:'pointer',fontSize:11,textDecoration:'underline'}},'Changer')
      ),
      isLocked
        ? CE('div',{style:{textAlign:'center',padding:'28px 0'}},
            CE('div',{style:{fontSize:44,marginBottom:10}},'🔒'),
            CE('div',{style:{fontSize:15,fontWeight:700,color:'#c53030',marginBottom:6}},'Accès temporairement bloqué'),
            CE('div',{style:{fontSize:28,fontWeight:800,color:'#1a202c',fontVariantNumeric:'tabular-nums'}},mins+'m'+secs+'s'),
            CE('div',{style:{fontSize:12,color:'#9ca3af',marginTop:4}},'Trop de tentatives incorrectes')
          )
        : CE(React.Fragment,null,
            CE('div',{style:{position:'relative',marginBottom:10}},
              CE('input',{
                type:show?'text':'password',placeholder:'Mot de passe',value:pwd,
                onChange:e=>setPwd(e.target.value),
                onKeyDown:e=>e.key==='Enter'&&handleSubmit(),
                style:{width:'100%',padding:'10px 40px 10px 14px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:14,outline:'none',boxSizing:'border-box'}
              }),
              CE('button',{onClick:()=>setShow(s=>!s),style:{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#718096',padding:0}},show?'🙈':'👁️')
            ),
            err&&CE('p',{style:{color:'#c53030',fontSize:13,marginBottom:8}},err),
            hint&&!err&&CE('p',{style:{color:'#718096',fontSize:12,marginBottom:8,display:'flex',alignItems:'center',gap:6}},CE('span',{className:'spinner',style:{width:12,height:12,borderWidth:2}}),hint),
            CE('button',{onClick:handleSubmit,disabled:loading||!pwd.trim(),style:{width:'100%',padding:'11px',background:'#1e3a8a',color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:700,cursor:'pointer'}},loading?'Vérification…':'Connexion')
          )
    )
  );
}

        },'Supprimer')
      )

}

// ── App Admin ──────────────────────────────────────────────
function App(){

    statuts:[...STATUTS_DEFAULT],conseillers:[...CONSEILLERS_DEFAULT],

  });
  const[emails,setEmails]  = React.useState({});  // v9.3

  const[logFilter,setLogFilter]= React.useState('all'); // v10.0 : filtre logs
  const[pinned,setPinned]= React.useState(()=>localStorage.getItem('adm_sidebar_pinned')==='1'); // épingle sidebar

  // v9.5 : logs persistants via localStorage
  // v10.0 : logs avec timestamp ms pour purge +30j, limite 200, auto-purge au démarrage
  const LOGS_PURGE_MS=30*24*60*60*1000;
  const[logs,setLogs]=React.useState(()=>{
    try{
      const raw=JSON.parse(localStorage.getItem('adm_logs')||'[]');
      const cutoff=Date.now()-30*24*60*60*1000;
      return raw.filter(e=>!e.ts||e.ts>=cutoff);
    }catch{return[];}
  });
  function addLog(msg,type='info'){
    const entry={msg,type,t:new Date().toLocaleTimeString('fr-FR'),ts:Date.now()};
    setLogs(l=>{const nl=[entry,...l].slice(0,200);try{localStorage.setItem('adm_logs',JSON.stringify(nl));}catch{}return nl;});
  }
  function clearLogs(){setLogs([]);try{localStorage.removeItem('adm_logs');}catch{}}
  function purgeLogs(){
    const cutoff=Date.now()-LOGS_PURGE_MS;
    setLogs(l=>{const nl=l.filter(e=>!e.ts||e.ts>=cutoff);try{localStorage.setItem('adm_logs',JSON.stringify(nl));}catch{}return nl;});
  }

  // ── v10.0 : Session expirante ──────────────────────────────
  // Déconnexion automatique après 30 min d'inactivité.
  // touchSession() appelé sur chaque interaction clavier/souris.
  function doSessionExpire(){
    clearSession();
    setAuth(false);
    showToast('⏱️ Session expirée — reconnecte-toi.',false);
    addLog('Session expirée (30 min inactivité)','info');
  }
  React.useEffect(()=>{
    if(!auth) return;
    touchSession();
    // Vérification toutes les 60s
    const interval = setInterval(()=>{
      if(isSessionExpired()) doSessionExpire();
    }, 60*1000);
    // Vérification au retour sur l'onglet
    function onFocus(){ if(isSessionExpired()) doSessionExpire(); else touchSession(); }
    window.addEventListener('focus', onFocus);
    // Touch sur toute interaction utilisateur
    function onActivity(){ touchSession(); }
    window.addEventListener('keydown', onActivity, {passive:true});
    window.addEventListener('mousedown', onActivity, {passive:true});
    window.addEventListener('touchstart', onActivity, {passive:true});
    return ()=>{
      clearInterval(interval);
      window.removeEventListener('focus', onFocus);
      window.removeEventListener('keydown', onActivity);
      window.removeEventListener('mousedown', onActivity);
      window.removeEventListener('touchstart', onActivity);
    };
  },[auth]);

  async function loadData(attempt=1, silent=false){
    setSyncing(true); // v9.5

      // Timeout adaptatif : court sur PC/fibre, long sur mobile/4G
      const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);
      const timeouts=isMobile?[20000,25000,30000]:[8000,10000,12000];
      const timeoutMs=timeouts[attempt-1]||timeouts[timeouts.length-1];
      const res=await Promise.race([fetch(`${GS_URL}?action=getAll&year=${annee}`),new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),timeoutMs))]);
      const data=await res.json();
      if(!data.ok)throw new Error(data.error||'Erreur serveur');

      if(data.lists){

        setLists(nl);STATUTS=[...nl.statuts];CONSEILLERS=[...nl.conseillers];PUBLICS=[...nl.publics];MATERIELS=[...nl.materiels];
        addLog('Listes synchronisées','ok');
      }
      if(data.conseiller_colors){applyColors(data.conseiller_colors);}
      if(data.emails){setEmails(data.emails);addLog('Emails chargés','ok');}  // v9.3
      addLog(`${incoming.length} ateliers chargés (${annee})`,'ok');
      setLastSync(new Date());
      setSeenIds(prev=>{if(prev.size===0)return new Set(incoming.map(e=>e._id));const nouvs=incoming.filter(e=>!prev.has(e._id));if(nouvs.length>0)setNewEntries(n=>[...nouvs,...n]);return new Set(incoming.map(e=>e._id));});
      setLoading(false);setSyncing(false); // v9.5
    }catch(err){
      if(err.message==='timeout'&&attempt<3){addLog(`Tentative ${attempt}/3…`,'info');const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);setTimeout(()=>loadData(attempt+1,silent),isMobile?[3000,6000][attempt-1]:2000);}
      else{setError(attempt>1?'Google Sheets ne répond pas après 3 tentatives.':'Impossible de charger : '+err.message);addLog('Erreur : '+err.message,'err');setLoading(false);setSyncing(false);} // v9.5
    }
  }

  const isFirstLoad=React.useRef(true);
  React.useEffect(()=>{loadCommunes47().catch(()=>{});},[]);
  React.useEffect(()=>{
    if(isFirstLoad.current){isFirstLoad.current=false;loadData();}

  // v9.4 : sync auto toutes les 5 min
  React.useEffect(()=>{
    const id=setInterval(()=>loadData(1,true),5*60*1000);
    return()=>clearInterval(id);
  },[annee]);

    setLists(newLists);STATUTS=[...newLists.statuts];CONSEILLERS=[...newLists.conseillers];PUBLICS=[...newLists.publics];MATERIELS=[...newLists.materiels];
  }

  function handleSaveEmails(newEmails){  // v9.3
    setEmails(newEmails);
  }

  // v9.5 : compteurs par statut — doit être AVANT les early returns (Rules of Hooks)
  const STATUS_PALETTE={'Planifié':'#9683EC','Réalisé':'#70AD47','Annulé':'#FF5050','Non réalisé':'#FFC000','Reporté':'#ED7D31'};

    entries.forEach(e=>{const s=e.statut||'?';c[s]=(c[s]||0)+1;});
    return Object.entries(STATUS_PALETTE).filter(([s])=>c[s]>0).map(([s,color])=>({s,v:c[s],color}));
  },[entries]);

  if(!auth)return CE(AdminLogin,{onLogin:()=>setAuth(true),savedName:adminConseiller,onResetProfil:()=>{localStorage.removeItem('adm_conseiller');setAdminConseiller('');}})

  if(!adminConseiller)return CE('div',{className:'login-wrap'},
    CE('div',{className:'login-card'},
      CE('h2',null,'👤 Qui êtes-vous ?'),
      loading
        ? CE('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:12,padding:'24px 0',color:'#9ca3af'}},
            CE('span',{className:'spinner',style:{width:24,height:24,borderWidth:3}}),
            CE('span',{style:{fontSize:13}},'Chargement en cours…')
          )
        : CE(React.Fragment,null,
            CE('p',{style:{fontSize:13,color:'#718096',margin:'8px 0 20px'}},'Pour personnaliser votre interface'),
            (lists.conseillers||CONSEILLERS_DEFAULT).map(c=>
              CE('button',{key:c,onClick:()=>{localStorage.setItem('adm_conseiller',c);setAdminConseiller(c);},
                style:{display:'block',width:'100%',marginBottom:10,padding:'11px 16px',border:`2px solid ${conseillerColor(c)}22`,borderRadius:10,background:`${conseillerColor(c)}11`,color:conseillerColor(c),fontSize:14,fontWeight:700,cursor:'pointer',textAlign:'left',transition:'all .15s'}},
                CE('span',{style:{display:'inline-block',width:10,height:10,borderRadius:'50%',background:conseillerColor(c),marginRight:8}}),c)
            ),
            CE('button',{onClick:()=>{localStorage.setItem('adm_conseiller','admin');setAdminConseiller('admin');},style:{display:'block',width:'100%',padding:'11px 16px',border:'2px solid #e2e8f0',borderRadius:10,background:'#f8fafc',color:'#718096',fontSize:13,cursor:'pointer',marginTop:4}},'Continuer sans personnalisation')
          )
    )
  );

  const sideBtn=(v,ico,lbl,extraClass)=>CE('button',{

    className:'sidebar-btn'+(view===v?' active':'')+(extraClass?' '+extraClass:''),

// ── TableCommunes : tri par colonne ────────────────────────
function TableCommunes({fd}){
  const[sortKey,setSortKey]=React.useState('ateliers');
  const[sortDir,setSortDir]=React.useState(-1); // -1 desc, 1 asc

  function handleSort(key){
    if(sortKey===key) setSortDir(d=>d*-1);
    else{setSortKey(key);setSortDir(-1);}
  }

  const communes=[...new Set(fd.map(d=>d.commune).filter(Boolean))].map(c=>{
    const r=fd.filter(d=>d.commune===c);
    const rl=r.filter(d=>d.statut==='Réalisé').length;
    const ins=r.reduce((s,d)=>s+(parseInt(d.inscrits)||0),0);
    const pre=r.reduce((s,d)=>s+(parseInt(d.presents)||0),0);
    const tp=ins?Math.round(pre/ins*100):0;
    return{name:c,ateliers:r.length,realises:rl,inscrits:ins,presents:pre,presence:tp};
  }).sort((a,b)=>sortDir*(a[sortKey]>b[sortKey]?1:a[sortKey]<b[sortKey]?-1:0));

  const COLS=[
    {key:'name',     label:'Commune'},
    {key:'ateliers', label:'Atl.'},
    {key:'realises', label:'Réal.'},
    {key:'inscrits', label:'Inscrits'},
    {key:'presents', label:'Présents'},
    {key:'presence', label:'Présence'},
  ];

  function ThSort({col}){
    const active=sortKey===col.key;
    const arrow=active?(sortDir===-1?'↓':'↑'):'↕';
    return CE('th',{
      onClick:()=>handleSort(col.key),
      style:{padding:'7px 8px',textAlign:'left',fontWeight:700,
        color:active?'#2563EB':'#6b7280',borderBottom:'2px solid '+(active?'#2563EB':'#e5e7eb'),
        fontSize:10,whiteSpace:'nowrap',cursor:'pointer',userSelect:'none',
        background:active?'#eff6ff':'#f9fafb',transition:'all .15s'}
    },
      CE('span',null,col.label),
      CE('span',{style:{marginLeft:4,opacity:active?1:.4,fontSize:9}},arrow)
    );
  }

  return CE('div',{style:{overflowX:'auto'}},
    CE('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:11}},
      CE('thead',null,CE('tr',null,COLS.map(col=>CE(ThSort,{key:col.key,col})))),
      CE('tbody',null,communes.map((c,i)=>{
        const tpColor=c.presence>70?'#16a34a':c.presence>40?'#d97706':'#ef4444';
        return CE('tr',{key:c.name,style:{background:i%2?'#f9fafb':'#fff'}},
          CE('td',{style:{padding:'6px 8px',fontWeight:600,fontSize:10}},c.name.slice(0,18)),
          CE('td',{style:{padding:'6px 8px'}},c.ateliers),
          CE('td',{style:{padding:'6px 8px',color:'#16a34a',fontWeight:600}},c.realises),
          CE('td',{style:{padding:'6px 8px'}},c.inscrits),
          CE('td',{style:{padding:'6px 8px'}},c.presents),
          CE('td',{style:{padding:'6px 8px'}},
            CE('div',{style:{display:'flex',alignItems:'center',gap:5}},
              CE('div',{style:{height:5,width:36,background:'#f3f4f6',borderRadius:3}},
                CE('div',{style:{height:5,borderRadius:3,width:c.presence+'%',background:tpColor}})
              ),
              CE('span',{style:{fontSize:10,fontWeight:700,color:tpColor}},c.presence+'%')
            )
          )
        );
      }))
    )
  );
}


// ── VueDashboardTabs — Dashboard unifié (3 onglets) ──────────
function VueDashboard({entries}){
  if(!window.echarts)return CE('div',{className:'card'},CE('p',{style:{color:'#718096',textAlign:'center',padding:'40px 0'}},'⚠️ ECharts non chargé.'));

  const[periodeIdx,setPeriodeIdx]=React.useState(0); // défaut : tout
  const[selectedMonths,setSelectedMonths]=React.useState([]); // mois sélectionnés (1-12)
  const MOIS_LABELS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  function toggleMonth(m){ setSelectedMonths(s=>s.includes(m)?s.filter(x=>x!==m):[...s,m]); }
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  const todayYM=now.toISOString().slice(0,7);

  function getDateFrom(idx){
    if(idx===0)return '';
    const d=new Date(now);
    if(idx===1){d.setDate(1);return d.toISOString().slice(0,10);}
    if(idx===2){d.setMonth(d.getMonth()-3);return d.toISOString().slice(0,10);}
    if(idx===3){d.setMonth(d.getMonth()-6);return d.toISOString().slice(0,10);}
    if(idx===4){d.setFullYear(d.getFullYear()-1);return d.toISOString().slice(0,10);}
    return '';
  }
  const dateFrom=getDateFrom(periodeIdx);
  const filtered=React.useMemo(()=>{
    let r=dateFrom?entries.filter(e=>e.date&&e.date>=dateFrom):entries;
    if(selectedMonths.length>0) r=r.filter(e=>e.date&&selectedMonths.includes(parseInt(e.date.slice(5,7))));
    return r;
  },[entries,dateFrom,selectedMonths]);

  // Période précédente (même durée) pour tendances
  const prevFiltered=React.useMemo(()=>{
    if(periodeIdx===0)return[];
    const df=new Date(dateFrom);const prevTo=new Date(dateFrom);prevTo.setDate(prevTo.getDate()-1);
    const prevFrom=new Date(df);
    if(periodeIdx===1)prevFrom.setMonth(prevFrom.getMonth()-1);
    if(periodeIdx===2)prevFrom.setMonth(prevFrom.getMonth()-3);
    if(periodeIdx===3)prevFrom.setMonth(prevFrom.getMonth()-6);
    if(periodeIdx===4)prevFrom.setFullYear(prevFrom.getFullYear()-1);
    const pf=prevFrom.toISOString().slice(0,10);const pt=prevTo.toISOString().slice(0,10);
    return entries.filter(e=>e.date&&e.date>=pf&&e.date<=pt);
  },[entries,periodeIdx,dateFrom]);

  function mkTrend(curr,prev){
    if(periodeIdx===0||prev===0)return undefined;
    return Math.round((curr-prev)/prev*100);
  }

  // KPIs
  const realises=filtered.filter(e=>e.statut==='Réalisé');
  const annules=filtered.filter(e=>e.statut==='Annulé');
  const planifies=filtered.filter(e=>e.statut==='Planifié'&&e.date>=todayStr);
  const presents=realises.reduce((s,e)=>s+(parseInt(e.presents)||0),0);
  const inscrits=realises.reduce((s,e)=>s+(parseInt(e.inscrits)||0),0);
  const txPresence=inscrits>0?Math.round(presents/inscrits*100):0;
  const txAnnul=filtered.length>0?Math.round(annules.length/filtered.length*100):0;
  const prevR=prevFiltered.filter(e=>e.statut==='Réalisé');
  const prevPresents=prevR.reduce((s,e)=>s+(parseInt(e.presents)||0),0);

  // Statuts donut
  const STATUS_COLORS={'Réalisé':'#16a34a','Planifié':'#2563eb','Annulé':'#dc2626','Non réalisé':'#d97706','Reporté':'#9683EC'};
  const byStat={};filtered.forEach(e=>{byStat[e.statut]=(byStat[e.statut]||0)+1;});
  const dataStat=Object.entries(byStat).map(([label,value])=>({label,value}));

  // Activité mensuelle empilée
  const byMoisAct={};filtered.forEach(e=>{
    const m=e.date?e.date.slice(0,7):'?';
    if(m==='?')return;
    if(!byMoisAct[m])byMoisAct[m]={realises:0,annules:0,planifies:0};
    if(e.statut==='Réalisé')byMoisAct[m].realises++;
    else if(e.statut==='Annulé')byMoisAct[m].annules++;
    else if(e.statut==='Planifié')byMoisAct[m].planifies++;
  });

  // Top communes
  const byCommune={};realises.forEach(e=>{byCommune[e.commune]=(byCommune[e.commune]||0)+1;});
  const topCommunes=Object.entries(byCommune).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([label,value])=>({label,value}));

  // Thématiques
  const byTheme={};realises.forEach(e=>{const t=e.thematique||'Autre';byTheme[t]=(byTheme[t]||0)+1;});
  const dataTheme=Object.entries(byTheme).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([label,value])=>({label,value}));

  // Public
  const byPublic={};realises.forEach(e=>{const p=e.public||'Autres';byPublic[p]=(byPublic[p]||0)+1;});
  const dataPublic=Object.entries(byPublic).sort((a,b)=>b[1]-a[1]).map(([label,value])=>({label,value}));

  const PERIODES=[{l:'Tout'},{l:'Ce mois'},{l:'3 mois'},{l:'6 mois'},{l:'12 mois'}];
  const accent='#1e3a8a';

  return CE('div',null,

    // ── Barre période ──
    CE('div',{className:'card',style:{marginBottom:12,padding:'12px 16px'}},
      CE('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
        CE('span',{style:{fontSize:12,fontWeight:700,color:'#718096'}},'Période :'),
        PERIODES.map((p,i)=>CE('button',{key:i,onClick:()=>setPeriodeIdx(i),style:{
          padding:'4px 13px',borderRadius:20,fontSize:12,fontWeight:600,cursor:'pointer',
          border:`1.5px solid ${periodeIdx===i?accent:'#e2e8f0'}`,
          background:periodeIdx===i?accent:'#fff',
          color:periodeIdx===i?'#fff':'#718096',transition:'all .15s'
        }},p.l)),
        CE('span',{style:{marginLeft:'auto',fontSize:11,color:'#9ca3af'}},filtered.length+' ateliers · '+now.toLocaleDateString('fr-FR'))
      ),
      CE('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginTop:8,paddingTop:8,borderTop:'1px solid #f1f5f9'}},
        CE('span',{style:{fontSize:12,fontWeight:700,color:'#718096'}},'Mois :'),
        MOIS_LABELS.map((m,i)=>{const mo=i+1;return CE('button',{key:mo,onClick:()=>toggleMonth(mo),style:{
          padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',
          border:`1.5px solid ${selectedMonths.includes(mo)?accent:'#e2e8f0'}`,
          background:selectedMonths.includes(mo)?accent:'#fff',
          color:selectedMonths.includes(mo)?'#fff':'#718096',transition:'all .15s'
        }},m);}),
        selectedMonths.length>0&&CE('button',{onClick:()=>setSelectedMonths([]),style:{
          padding:'3px 10px',borderRadius:20,fontSize:11,cursor:'pointer',
          border:'1.5px solid #fca5a5',background:'#fff',color:'#ef4444',fontWeight:600
        }},'✕ Effacer')
      )
    ),

    // ── KPIs ──
    CE('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:16}},
      CE(KpiCard,{val:realises.length,lbl:'Ateliers réalisés',icon:'✅',color:'#16a34a',bgColor:'#f0fdf4',trend:mkTrend(realises.length,prevR.length)}),
      CE(KpiCard,{val:planifies.length,lbl:'Planifiés à venir',icon:'📅',color:'#2563eb',bgColor:'#eff6ff'}),
      CE(KpiCard,{val:presents,lbl:'Participants présents',icon:'👥',color:'#7c3aed',bgColor:'#faf5ff',trend:mkTrend(presents,prevPresents)}),
      CE(KpiCard,{val:inscrits,lbl:'Inscrits total',icon:'📝',color:'#0891b2',bgColor:'#ecfeff'}),
      CE(KpiCard,{val:txPresence+'%',lbl:'Taux de présence',icon:'🎯',
        color:txPresence>=70?'#16a34a':txPresence>=50?'#d97706':'#dc2626',
        bgColor:txPresence>=70?'#f0fdf4':txPresence>=50?'#fffbeb':'#fef2f2'}),
      CE(KpiCard,{val:txAnnul+'%',lbl:'Taux d\'annulation',icon:'❌',
        color:txAnnul<=10?'#16a34a':txAnnul<=20?'#d97706':'#dc2626',
        bgColor:txAnnul<=10?'#f0fdf4':txAnnul<=20?'#fffbeb':'#fef2f2'})
    ),

    // ── Ligne 1 : Activité mensuelle + Donut statuts ──
    CE('div',{style:{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:16}},
      CE('div',{className:'card'},
        CE('h2',null,'📈 Activité mensuelle'),
        CE(StackedActivityChart,{data:byMoisAct})
      ),
      CE('div',{className:'card'},
        CE('h2',null,'🔵 Répartition statuts'),
        CE(DonutChart,{data:dataStat,colors:dataStat.map(d=>STATUS_COLORS[d.label]||'#718096'),height:220})
      )
    ),

    // ── Ligne 2 : Par conseiller (pleine largeur) ──
    CE('div',{className:'card',style:{marginBottom:16}},
      CE('h2',null,'👤 Performance par conseiller'),
      CE(ConseillerBarChart,{entries:filtered})
    ),

    // ── Ligne 3 : Communes + Thématiques ──
    CE('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}},
      CE('div',{className:'card'},
        CE('h2',null,'📍 Top communes (réalisés)'),
        CE(BarChart,{data:topCommunes,colors:['#1e3a8a','#2563eb','#3b82f6','#60a5fa','#93c5fd']})
      ),
      CE('div',{className:'card'},
        CE('h2',null,'📚 Par thématique'),
        CE(BarChart,{data:dataTheme,colors:['#7c3aed','#8b5cf6','#a78bfa','#c4b5fd']})
      )
    ),

    // ── Ligne 4 : Public + AM/PM ──
    CE('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}},
      CE('div',{className:'card'},
        CE('h2',null,'🧑‍🤝‍🧑 Par type de public'),
        CE(BarChart,{data:dataPublic,colors:['#DB2777','#ec4899','#f472b6','#fbcfe8']})
      ),
      CE('div',{className:'card'},
        CE('h2',null,'🌅 Matin vs Après-midi'),
        CE(DonutChart,{
          data:[
            {label:'Matin (AM)',value:filtered.filter(e=>e.ampm==='AM'||(!e.ampm&&e.horaire&&parseInt(e.horaire)<12)).length},
            {label:'Après-midi (PM)',value:filtered.filter(e=>e.ampm==='PM'||(!e.ampm&&e.horaire&&parseInt(e.horaire)>=12)).length}
          ],
          colors:['#f97316','#0891b2'],height:200
        })
      )
    )

// ── VueAdmin override ──────────────────────────────────────
function VueAdminV10({entries,onRefresh,addLog,conseillersList,onSaveColors,annee}){
  const[resetStep,setResetStep]=React.useState(0);
  const[visibility,setVisibility]=React.useState(null);

  const[importing,setImporting]=React.useState(false);

  const[importPreview,setImportPreview]=React.useState(null); // v10 : aperçu avant envoi
  const[importRapport,setImportRapport]=React.useState(null); // v10 : rapport post-import
  const cancelRef=React.useRef(false);

  // v10.0 : Timeline export (restauré depuis v9.5)

  const MOIS_SHORT_CAL=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const[moisDeb,setMoisDeb]=React.useState(()=>parseInt(localStorage.getItem('cal_moisDeb')||'1'));
  const[moisFin,setMoisFin]=React.useState(()=>parseInt(localStorage.getItem('cal_moisFin')||'12'));
  const[tlRunning,setTlRunning]=React.useState(false);
  const[tlLogs,setTlLogs]=React.useState([]);
  const[lastExport,setLastExport]=React.useState(null);
  function addTlLog(msg,type='info'){setTlLogs(l=>[...l,{msg,type,t:new Date().toLocaleTimeString('fr-FR')}]);}
  function changeMoisDeb(v){localStorage.setItem('cal_moisDeb',v);setMoisDeb(v);setLastExport(null);}
  function changeMoisFin(v){localStorage.setItem('cal_moisFin',v);setMoisFin(v);setLastExport(null);}
  const VIS_ITEMS=[{key:'saisie',label:'✏️ Saisie',sub:'Formulaire de saisie'},{key:'historique',label:'📋 Historique',sub:'Liste des ateliers'},{key:'agenda',label:'🗓️ Agenda',sub:'Planning hebdo AM/PM'},{key:'calendrier',label:'📅 Calendrier',sub:'Vue calendrier mensuelle'},{key:'dashboard',label:'📊 Dashboard',sub:'Synthèse · Graphiques · Territoire'},{key:'carte',label:'🗺️ Carte',sub:'Carte des communes'},{key:'bingo',label:'🎯 Bingo',sub:'Vue par commune'},{key:'roadmap',label:'🛣️ Roadmap',sub:'Timeline & densité'}];

  React.useEffect(()=>{apiFetch('getVisibility').then(res=>{if(res.ok)setVisibility(res.visibility);}).catch(()=>{});},[]);
  React.useEffect(()=>{setColorDraft(d=>{const draft={...CONSEILLER_COLORS,...d};(conseillersList||[]).forEach(c=>{if(!draft[c])draft[c]='#6B7280';});return draft;});},[conseillersList]);

  // ── v10.0 : KPIs enrichis ─────────────────────────────────
  const kpis=React.useMemo(()=>{
    const now=new Date();
    const moisActuel=now.getMonth(), anneeActuelle=now.getFullYear();
    const total=entries.length;
    const realises=entries.filter(e=>e.statut==='Réalisé').length;
    const annules=entries.filter(e=>e.statut==='Annulé').length;
    const base=total-annules;
    const taux=base>0?Math.round(realises/base*100):0;
    const ceMois=entries.filter(e=>{
      if(!e.date)return false;
      const d=new Date(e.date);
      return d.getFullYear()===anneeActuelle&&d.getMonth()===moisActuel;
    }).length;
    const parConseiller={};
    entries.forEach(e=>{if(e.conseiller){parConseiller[e.conseiller]=(parConseiller[e.conseiller]||0)+1;}});
    const topConseiller=Object.entries(parConseiller).sort((a,b)=>b[1]-a[1])[0];
    return{total,realises,taux,ceMois,topConseiller,annules};
  },[entries,annee]);

  async function handleSaveColors(){
    setColorSaving(true);
    try{const res=await apiFetch('saveColors',{colors:JSON.stringify(colorDraft)});if(!res.ok)throw new Error(res.error);applyColors(colorDraft);if(onSaveColors)onSaveColors(colorDraft);showToast('✅ Couleurs sauvegardées');addLog('Couleurs conseillers mises à jour','ok');}
    catch(err){showToast('❌ '+err.message,false);}
    finally{setColorSaving(false);}
  }

  async function handleSaveVisibility(){
    setVisSaving(true);
    try{const res=await apiFetch('saveVisibility',{visibility:JSON.stringify(visibility)});if(res.ok){showToast('✅ Visibilité sauvegardée');addLog('Visibilité frontend mise à jour','ok');}else throw new Error(res.error);}
    catch(err){showToast('❌ '+err.message,false);}
    finally{setVisSaving(false);}
  }

  function handleReset(){if(resetStep===0){setResetStep(1);return;}if(resetStep===1){setResetStep(2);return;}addLog('Réinitialisation BDD locale','info');showToast('✅ BDD locale vidée (Google Sheet intact)');setResetStep(0);onRefresh();}

  // ── v10.0 : Export Timeline ────────────────────────────────
  async function handleExport(){
    setTlRunning(true);setTlLogs([]);setLastExport(null);
    try{
      const yr=parseInt(annee||new Date().getFullYear());
      if(moisDeb>moisFin)throw new Error('Mois de début postérieur au mois de fin.');
      const months=[];for(let m=moisDeb;m<=moisFin;m++)months.push(m);
      addTlLog(`Traitement de ${entries.length} ateliers pour ${yr}…`);
      const df=[];
      for(const e of entries){
        if(!e.date||!e.conseiller)continue;
        const s=String(e.date).trim();let d=null;
        const mFr=s.match(/^(?:\w+\s+)?(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if(mFr)d=new Date(Date.UTC(parseInt(mFr[3]),parseInt(mFr[2])-1,parseInt(mFr[1])));
        if(!d){const mIso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(mIso)d=new Date(Date.UTC(+mIso[1],+mIso[2]-1,+mIso[3]));}
        if(!d||isNaN(d.getTime()))continue;
        if(d.getUTCFullYear()!==yr)continue;
        if(!months.includes(d.getUTCMonth()+1))continue;
        df.push({date:d,horaire:e.horaire||'9H00',ampm:'',conseiller:String(e.conseiller).trim(),orienteur:String(e.orienteur||'').trim()||'—',statut:String(e.statut||'').trim()});
      }
      addTlLog(`✓ ${df.length} ateliers valides`,'ok');
      const cons=conseillersList||[];
      addTlLog(`→ ${cons.length} conseillers : ${cons.join(', ')}`);
      if(df.length===0)throw new Error('Aucun atelier trouvé pour cette période. Vérifiez l\'année et les mois sélectionnés.');
      const wb=window.generateCalendrier(df,yr,months,cons,addTlLog);
      const outData=XLSX.write(wb,{type:'base64',bookType:'xlsx'});
      const fileName=`Calendrier_ateliers_${yr}.xlsx`;
      const dataUrl='data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,'+outData;
      setLastExport({url:dataUrl,name:fileName});
      const a=document.createElement('a');a.href=dataUrl;a.download=fileName;document.body.appendChild(a);a.click();document.body.removeChild(a);
      addTlLog(`✓ "${fileName}" téléchargé`,'ok');
    }catch(err){addTlLog('✗ '+err.message,'err');console.error(err);}
    finally{setTlRunning(false);}
  }

  // ── v10.0 : Validation pré-import ─────────────────────────
  function detectErrors(rows){
    const errs=[];
    rows.forEach((r,i)=>{
      const ln='Ligne '+(i+2);
      if(!r.statut)errs.push(ln+' : statut vide');
      if(!r.date||r.date==='Invalid Date'||r.date==='NaN-NaN-NaN')errs.push(ln+' : date invalide ('+JSON.stringify(r.date)+')');
      if(!r.conseiller)errs.push(ln+' : conseiller vide');
      if(!r.commune)errs.push(ln+' : commune vide');
    });
    return errs;
  }

  async function doUpload(rows_raw){
    setImportPreview(null);setImporting(true);setImportProgress(0);
    const BATCH=5;let done=0;const batchErrors=[];let annule=false;
    try{
      setImportMsg(`${rows_raw.length} lignes — envoi vers Google Sheets…`);
      for(let i=0;i<rows_raw.length;i+=BATCH){
        if(cancelRef.current){annule=true;break;}
        const batch=rows_raw.slice(i,i+BATCH);
        const params=new URLSearchParams({action:'saveMany',entries:JSON.stringify(batch)});
        try{
          const res=await Promise.race([fetch(`${GS_URL}?${params.toString()}`),new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),45000))]);
          const data=await res.json();
          if(!data.ok)throw new Error(data.error||'Erreur batch');
          done+=batch.length;
        }catch(be){batchErrors.push({from:i+1,to:Math.min(i+BATCH,rows_raw.length),msg:be.message});}
        setImportProgress(Math.round(Math.min(done+(batchErrors.length*BATCH),rows_raw.length)/rows_raw.length*100));
        setImportMsg(`${done}/${rows_raw.length} lignes importées…`);
      }
      // v10.0 : rapport d'import
      const rapport={total:rows_raw.length,envoyes:done,batchErrors,anomaliesPre:preErrorCountRef.current,annule,ts:new Date().toLocaleString('fr-FR')};
      setImportRapport(rapport);
      const logMsg=`Import : ${done}/${rows_raw.length} envoyés`+(batchErrors.length>0?` · ${batchErrors.length} erreur(s) batch`:'')+(annule?' · annulé':'');
      addLog(logMsg,batchErrors.length>0||annule?'err':'ok');
      if(!annule&&batchErrors.length===0)showToast(`✅ ${done} ateliers importés`);
      onRefresh();
    }catch(err){showToast('❌ '+err.message,false);addLog('Erreur import : '+err.message,'err');}
    finally{setImporting(false);setImportProgress(0);setImportMsg('');cancelRef.current=false;}
  }

  async function handleImportCSV(e){
    const file=e.target.files[0];if(!file)return;e.target.value='';
    try{
      const text=await file.text();const lines=text.split('\n').filter(l=>l.trim());
      if(lines.length<2)throw new Error('Fichier vide ou invalide');
      const sep=(lines[0].split(';').length>lines[0].split(',').length)?';':',';
      function parseCSVLine(line){const res=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"')inQ=!inQ;else if(c===sep&&!inQ){res.push(cur.trim());cur='';}else cur+=c;}res.push(cur.trim());return res;}
      const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim());
      const rows_raw=[];
      for(let i=1;i<lines.length;i++){const vals=parseCSVLine(lines[i]);if(vals.length<3)continue;const row={};headers.forEach((h,idx)=>{row[h]=vals[idx]?vals[idx].replace(/^"|"$/g,'').trim():'';});if(!row._id&&!row.statut&&!row['Statut'])continue;
        const g=(...keys)=>{for(const k of keys){if(row[k]!==undefined&&row[k]!=='')return row[k];}return '';};
        rows_raw.push({_id:g('_id')||genId(),_n:parseInt(g('_n','N°'))||0,statut:g('statut','Statut')||'Planifié',date:normalizeDate(g('date','Date')),horaire:normalizeHoraire(g('horaire','Horaire')),ampm:g('ampm','AM/PM')||'AM',orienteur:g('orienteur','Orienteur'),commune:normalizeCommune(g('commune','Commune')),lieu:g('lieu','Lieu',"Lieu de l'atelier"),thematique:g('thematique','Thématique','Thematique'),inscrits:g('inscrits','Inscrits')===''?'':parseInt(g('inscrits','Inscrits'))||0,presents:g('presents','Présents')===''?'':parseInt(g('presents','Présents'))||0,public:g('pub','public','Public')||'Tous publics',conseiller:g('conseiller','Conseiller','Conseiller numérique'),materiel:MATERIELS.filter(m=>String(g(m)).trim().toUpperCase()==='OUI'),residence:g('residence','Résidence','Résidence des participants'),remarques:g('remarques','Remarques')});
      }
