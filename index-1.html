<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ateliers Inclusion Numérique — Conseillers v9.3</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="shared.js"></script>
<style>
/* ── v9.3 : Sidebar expand — Frontend ───────────────────────── */
nav { display: none !important; }
.app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 72px; min-height: 100vh; position: fixed;
  top: 0; left: 0; display: flex; flex-direction: column;
  align-items: center; padding: 14px 0 16px; z-index: 200;
  transition: width .28s cubic-bezier(.4,0,.2,1), background .3s;
  box-shadow: 4px 0 24px rgba(0,0,0,.2), inset -1px 0 0 rgba(255,255,255,.08);
  overflow: hidden;
}
.sidebar:hover { width: 220px; }
.sidebar::before {
  content:''; position:absolute; top:0; left:0; right:0; height:120px;
  background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 100%);
  pointer-events:none; z-index:0;
}
.sidebar-logo {
  width:46px; height:46px; border-radius:14px;
  background:rgba(255,255,255,.18);
  box-shadow:0 2px 12px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.3);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; margin-bottom:5px; flex-shrink:0;
  position:relative; z-index:1;
  transition:transform .22s, box-shadow .22s;
}
.sidebar:hover .sidebar-logo {
  transform:scale(1.05);
  box-shadow:0 4px 18px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.35);
}
.sidebar-count {
  font-size:12px; font-weight:800;
  background:rgba(255,255,255,.2); color:#fff;
  padding:2px 9px; border-radius:20px; margin-bottom:10px;
  position:relative; z-index:1; letter-spacing:.02em;
}
.sidebar-sep {
  width:36px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  margin:5px 0; flex-shrink:0;
  transition:width .28s cubic-bezier(.4,0,.2,1);
}
.sidebar:hover .sidebar-sep { width:calc(100% - 24px); }
.sidebar-group-label {
  font-size:9px; text-transform:uppercase; letter-spacing:.16em;
  color:rgba(255,255,255,.38); padding:0 16px;
  align-self:stretch; white-space:nowrap; overflow:hidden;
  max-height:0; opacity:0; margin:0;
  transition:max-height .28s, opacity .18s, margin .28s;
}
.sidebar:hover .sidebar-group-label { max-height:22px; opacity:1; margin:6px 0 2px; }
.sidebar-btn {
  width:52px; height:44px; border-radius:12px;
  display:flex; flex-direction:row; align-items:center; justify-content:center;
  cursor:pointer;
  transition:width .28s cubic-bezier(.4,0,.2,1), background .18s, color .18s, margin .28s, box-shadow .18s;
  border:none; background:none; color:rgba(255,255,255,.62);
  flex-shrink:0; position:relative; overflow:hidden; margin:2px 0;
}
.sidebar:hover .sidebar-btn { width:calc(220px - 20px); margin:2px 10px; justify-content:flex-start; }
.sidebar-btn:hover { background:rgba(255,255,255,.14); color:#fff; box-shadow:0 2px 10px rgba(0,0,0,.1); }
.sidebar-btn.active { background:rgba(255,255,255,.22); color:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 2px 10px rgba(0,0,0,.1); }
.sidebar-btn.active::before {
  content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
  width:3px; height:22px; background:#fff; border-radius:0 3px 3px 0;
  box-shadow:0 0 10px rgba(255,255,255,.55);
}
.sidebar-btn-ico { font-size:18px; line-height:1; flex-shrink:0; width:52px; text-align:center; transition:width .28s cubic-bezier(.4,0,.2,1), transform .18s; }
.sidebar:hover .sidebar-btn-ico { width:40px; }
.sidebar-btn:hover .sidebar-btn-ico { transform:scale(1.1); }
.sidebar-btn-lbl {
  font-size:13px; font-weight:700; letter-spacing:.01em; line-height:1;
  white-space:nowrap; overflow:hidden; max-width:0; opacity:0;
  transition:max-width .28s cubic-bezier(.4,0,.2,1), opacity .18s .06s;
}
.sidebar:hover .sidebar-btn-lbl { max-width:160px; opacity:1; }
.sidebar-bottom {
  margin-top:auto; display:flex; flex-direction:column;
  align-items:center; gap:6px; padding:10px 0 0;
  border-top:1px solid rgba(255,255,255,.12); width:100%;
}
.sidebar-year {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  color:#fff; font-size:11px; font-weight:700; padding:5px 6px;
  border-radius:8px; text-align:center; width:52px; cursor:pointer; outline:none;
  transition:width .28s cubic-bezier(.4,0,.2,1);
}
.sidebar:hover .sidebar-year { width:calc(220px - 20px); }
.sidebar-year option { background:#197d89; color:#fff; }
.sidebar-notif-btn {
  width:52px; height:36px; border-radius:10px; background:#dc2626;
  border:none; color:#fff; font-size:10px; font-weight:800; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:4px;
  animation:pulse 1.5s infinite; flex-direction:column; line-height:1;
  box-shadow:0 2px 10px rgba(220,38,38,.4); overflow:hidden; white-space:nowrap;
  transition:width .28s cubic-bezier(.4,0,.2,1), flex-direction .1s;
}
.sidebar:hover .sidebar-notif-btn { width:calc(220px - 20px); flex-direction:row; margin:0 10px; }
.sidebar-accueil-btn {
  width:52px; height:36px; border-radius:10px;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.7); font-size:11px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:4px;
  white-space:nowrap; overflow:hidden;
  transition:width .28s cubic-bezier(.4,0,.2,1), background .18s, color .18s;
}
.sidebar:hover .sidebar-accueil-btn { width:calc(220px - 20px); margin:0 10px; }
.sidebar-accueil-btn:hover { background:rgba(255,255,255,.2); color:#fff; }
.app-content { margin-left:72px; flex:1; min-height:100vh; display:flex; flex-direction:column; }
.app-topbar {
  height:46px; display:flex; align-items:center; padding:0 22px;
  border-bottom:1px solid #e2e8f0; background:#fff;
  position:sticky; top:0; z-index:100;
  box-shadow:0 1px 5px rgba(0,0,0,.06); gap:10px;
}
.app-topbar-title { font-size:14px; font-weight:700; color:#1a202c; }
.app-topbar-sub { font-size:12px; color:#9ca3af; }
.app-topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.app-topbar-conseiller { font-size:12px; font-weight:700; padding:4px 12px; border-radius:20px; color:#fff; }
.app-main { padding:20px; max-width:1200px; width:100%; }
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── App Frontend (conseillers) v9.3 ──────────────────────────
var VIEW_META_F = {
  saisie:     {ico:'✏️',  label:'Saisie',      group:'Action'},
  historique: {ico:'📋',  label:'Historique',   group:'Voir'},
  calendrier: {ico:'📅',  label:'Calendrier',   group:'Voir'},
  carte:      {ico:'🗺️', label:'Carte',        group:'Voir'},
  graphiques: {ico:'📊',  label:'Statistiques', group:'Stats'},
  bingo:      {ico:'🎯',  label:'Bingo',        group:'Stats'},
};

function App(){
  const[view,setView]           = React.useState('accueil');
  const[entries,setEntries]     = React.useState([]);
  const[loading,setLoading]     = React.useState(true);
  const[error,setError]         = React.useState(null);
  const[newEntries,setNewEntries]= React.useState([]);
  const[seenIds,setSeenIds]     = React.useState(new Set());
  const[filtreConseiller,setFiltreConseiller]= React.useState(null);
  const[editingId,setEditingId] = React.useState(null);
  const[prefillData,setPrefillData]= React.useState(null);
  const[annee,setAnnee]         = React.useState(String(new Date().getFullYear()));
  const[visibility,setVisibility]= React.useState({saisie:true,historique:true,graphiques:true,carte:true,bingo:true,calendrier:false});
  const[lists,setLists]         = React.useState({
    statuts:[...STATUTS_DEFAULT],conseillers:[...CONSEILLERS_DEFAULT],
    publics:[...PUBLICS_DEFAULT],materiels:[...MATERIELS_DEFAULT]
  });

  async function loadData(attempt=1){
    setLoading(true);setError(null);
    try{
      const res=await Promise.race([fetch(`${GS_URL}?action=getAll&year=${annee}`),new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),12000))]);
      const data=await res.json();
      if(!data.ok)throw new Error(data.error||'Erreur serveur');
      const incoming=data.entries||[];
      setEntries(incoming);
      if(data.lists){
        const l=data.lists;
        const nl={statuts:Array.isArray(l.statuts)?l.statuts:[...STATUTS_DEFAULT],conseillers:Array.isArray(l.conseillers)?l.conseillers:[...CONSEILLERS_DEFAULT],publics:Array.isArray(l.publics)?l.publics:[...PUBLICS_DEFAULT],materiels:Array.isArray(l.materiels)?l.materiels:[...MATERIELS_DEFAULT]};
        setLists(nl);STATUTS=[...nl.statuts];CONSEILLERS=[...nl.conseillers];PUBLICS=[...nl.publics];MATERIELS=[...nl.materiels];
      }
      if(data.visibility)setVisibility(v=>({...v,...data.visibility}));
      if(data.conseiller_colors)applyColors(data.conseiller_colors);
      setSeenIds(prev=>{if(prev.size===0)return new Set(incoming.map(e=>e._id));const nouvs=incoming.filter(e=>!prev.has(e._id));if(nouvs.length>0)setNewEntries(n=>[...nouvs,...n]);return new Set(incoming.map(e=>e._id));});
      setLoading(false);
    }catch(err){
      if(err.message==='timeout'&&attempt<3){setTimeout(()=>loadData(attempt+1),2000);}
      else{setError(attempt>1?'Google Sheets ne répond pas après 3 tentatives.':'Impossible de charger : '+err.message);setLoading(false);}
    }
  }

  const isFirstLoad=React.useRef(true);
  React.useEffect(()=>{loadCommunes47().catch(()=>{});},[]);
  React.useEffect(()=>{
    if(isFirstLoad.current){isFirstLoad.current=false;loadData();}
    else{setSeenIds(new Set());loadData();}
  },[annee]);

  function handleChoixConseiller(nom){
    setFiltreConseiller(nom);
    setView(visibility.historique?'historique':visibility.calendrier?'calendrier':visibility.saisie?'saisie':'graphiques');
  }
  function handleEdit(id){setEditingId(id);setPrefillData(null);setView('saisie');}
  function handleSaved(){loadData();setView('historique');}
  async function handleDelete(id){
    try{const res=await apiFetch('delete',{_id:id});if(!res.ok)throw new Error(res.error);showToast('✅ Atelier supprimé');loadData();}
    catch(err){showToast('❌ '+err.message,false);}
  }
  function handleDuplicate(entry){
    const{_id,_n,date,horaire,ampm,inscrits,presents,remarques,...rest}=entry;
    setPrefillData({...rest});setEditingId(null);setView('saisie');
  }

  // ── Vue Accueil (pleine page, pas de sidebar) ─────────────
  if(view==='accueil'){
    return CE('div',null,
      CE('nav',{style:{background:NAV_DEFAULT_COLOR}},
        CE('span',{className:'logo'},'🖥️ Ateliers Inclusion Numérique'),
        loading&&CE('span',{style:{fontSize:11,color:'rgba(255,255,255,.6)',marginLeft:8,display:'flex',alignItems:'center',gap:5}},
          CE('span',{className:'spinner',style:{borderTopColor:'rgba(255,255,255,.8)',borderColor:'rgba(255,255,255,.2)'}}),
          'Chargement…')
      ),
      CE('div',{className:'main'},
        error
          ? CE('div',{className:'error-box'},CE('strong',null,'❌ Impossible de charger'),CE('span',null,error),CE('button',{className:'btn btn-primary',onClick:loadData},'🔄 Réessayer'))
          : CE(VueAccueil,{conseillers:lists.conseillers,onChoix:handleChoixConseiller,loading})
      ),
      CE('div',{id:'toast',className:'toast',style:{opacity:0}})
    );
  }

  // ── Vue principale avec sidebar ───────────────────────────
  const accentColor = filtreConseiller ? conseillerColor(filtreConseiller) : NAV_DEFAULT_COLOR;
  const meta = VIEW_META_F[view]||{ico:'📄',label:view,group:''};

  const sideBtn=(v,ico,lbl,visible=true)=>visible&&CE('button',{
    key:v, className:'sidebar-btn'+(view===v?' active':''), title:lbl, onClick:()=>setView(v)
  }, CE('span',{className:'sidebar-btn-ico'},ico), CE('span',{className:'sidebar-btn-lbl'},lbl));

  return CE('div',{className:'app-shell'},

    CE('aside',{className:'sidebar',style:{background:accentColor}},
      CE('div',{className:'sidebar-logo'},'🖥️'),
      entries.length>0&&CE('span',{className:'sidebar-count'},entries.length),

      // Groupe : Action
      CE('div',{className:'sidebar-sep'}),
      CE('span',{className:'sidebar-group-label'},'Action'),
      sideBtn('saisie','✏️','Saisie',visibility.saisie),

      // Groupe : Voir
      CE('div',{className:'sidebar-sep'}),
      CE('span',{className:'sidebar-group-label'},'Voir'),
      sideBtn('historique','📋','Historique',visibility.historique),
      sideBtn('calendrier','📅','Calendrier',visibility.calendrier),
      sideBtn('carte','🗺️','Carte',visibility.carte),

      // Groupe : Stats
      CE('div',{className:'sidebar-sep'}),
      CE('span',{className:'sidebar-group-label'},'Stats'),
      sideBtn('graphiques','📊','Statistiques',visibility.graphiques),
      sideBtn('bingo','🎯','Bingo',visibility.bingo),

      // Bas
      CE('div',{className:'sidebar-bottom'},
        CE('select',{className:'sidebar-year',value:annee,onChange:e=>setAnnee(e.target.value),title:'Année chargée'},
          [String(new Date().getFullYear()-1),String(new Date().getFullYear()),String(new Date().getFullYear()+1)].map(y=>CE('option',{key:y,value:y},y))
        ),
        newEntries.length>0&&CE('button',{
          className:'sidebar-notif-btn',
          title:`${newEntries.length} nouveaux ateliers`,
          onClick:()=>{setView('historique');window._filterNewEntries&&window._filterNewEntries(newEntries.map(e=>e._id));setNewEntries([]);}
        }, CE('span',null,'🔔'), CE('span',null,newEntries.length)),
        CE('button',{
          className:'sidebar-accueil-btn', title:'Retour accueil',
          onClick:()=>setView('accueil')
        }, CE('span',{style:{fontSize:14}},'↩'), CE('span',{style:{fontSize:11,fontWeight:700,marginLeft:4,overflow:'hidden',maxWidth:0,opacity:0,transition:'max-width .28s, opacity .18s .06s',whiteSpace:'nowrap'}},'Accueil'))
      )
    ),

    CE('div',{className:'app-content'},
      CE('div',{className:'app-topbar'},
        CE('span',{style:{fontSize:16}},meta.ico),
        CE('span',{className:'app-topbar-title'},meta.label),
        meta.group&&CE('span',{className:'app-topbar-sub'},'— '+meta.group),
        CE('div',{className:'app-topbar-right'},
          loading&&CE('span',{style:{fontSize:11,color:'#9ca3af',display:'flex',alignItems:'center',gap:4}},
            CE('span',{className:'spinner',style:{borderTopColor:'#1e3a8a',borderColor:'#e2e8f0'}}), 'Chargement…'),
          filtreConseiller&&CE('span',{className:'app-topbar-conseiller',style:{background:accentColor}},filtreConseiller)
        )
      ),

      CE('div',{className:'app-main'},
        error&&CE('div',{className:'error-box'},CE('strong',null,'❌ Impossible de charger'),CE('span',null,error),CE('button',{className:'btn btn-primary',onClick:loadData},'🔄 Réessayer')),
        !loading&&!error&&CE('div',null,
          view==='saisie'&&visibility.saisie&&CE(VueSaisie,{entries,onSaved:handleSaved,onNewEntry:e=>{setNewEntries(n=>[e,...n]);setSeenIds(s=>{const ns=new Set(s);ns.add(e._id);return ns;});},lists,editingId,onClearEdit:()=>setEditingId(null),prefillData,onClearPrefill:()=>setPrefillData(null),accentColor:conseillerColor(filtreConseiller||'')}),
          view==='historique'&&visibility.historique&&CE(VueHistorique,{entries,onEdit:handleEdit,onDelete:handleDelete,onRefresh:loadData,onDuplicate:handleDuplicate,initConseiller:filtreConseiller,onResetConseiller:()=>setFiltreConseiller(null),canDelete:true}),
          view==='calendrier'&&visibility.calendrier&&CE(VueCalendrier,{entries,onEdit:handleEdit,onDelete:handleDelete,onRefresh:loadData,onDuplicate:handleDuplicate,initConseiller:filtreConseiller,onResetConseiller:()=>setFiltreConseiller(null),canDelete:true}),
          view==='graphiques'&&visibility.graphiques&&CE(VueGraphiques,{entries}),
          view==='carte'&&visibility.carte&&CE(VueCarte,{entries,active:view==='carte'}),
          view==='bingo'&&visibility.bingo&&CE(VueBingo,{entries})
        )
      )
    ),

    CE('div',{id:'toast',className:'toast',style:{opacity:0}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(CE(App));
</script>
</body>
</html>
